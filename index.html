<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg3:#1a2235;
  --card:#151e2d;--card2:#1c2538;
  --border:#ffffff0f;--border2:#ffffff1a;
  --text:#f0f4ff;--text2:#8a94b0;--text3:#5a627a;
  --gold:#f5c842;--gold2:#e6a800;
  --green:#00d084;--green2:#00a566;
  --blue:#4f8ef7;--red:#ff4d6a;--purple:#a855f7;
}
html,body,#root{height:100%;width:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.2}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* SPLASH */
.splash{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
.splash-logo{width:60px;height:60px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#000}
.splash-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}.splash-text span{color:var(--gold)}
.spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:32px 28px;width:100%;max-width:400px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.auth-logo-icon{width:40px;height:40px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-family:'Syne',sans-serif;font-weight:800;color:#000}
.auth-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}.auth-logo-text span{color:var(--gold)}
.auth-title{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.auth-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:22px}
.form-group{margin-bottom:13px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--text3)}
.form-input-optional{font-size:11px;color:var(--text3);margin-left:4px}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;transition:all .2s;margin-top:4px}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed}
.btn-outline{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:14px;font-weight:600;transition:all .2s;margin-top:8px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.auth-switch{text-align:center;margin-top:16px;font-size:14px;color:var(--text2)}
.auth-switch button{background:none;border:none;color:var(--gold);font-weight:600;cursor:pointer}
.auth-forgot{text-align:right;margin-top:-4px;margin-bottom:12px}
.auth-forgot button{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer}
.auth-forgot button:hover{color:var(--gold)}
.msg-error{background:#ff4d6a15;border:1px solid #ff4d6a30;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px}
.msg-success{background:#00d08415;border:1px solid #00d08430;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:12px}
.msg-info{background:#4f8ef715;border:1px solid #4f8ef730;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--blue);margin-bottom:12px}

/* LAYOUT */
.app-layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 18px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:'Syne',sans-serif;font-weight:800;color:#000;flex-shrink:0}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}.sidebar-logo-text span{color:var(--gold)}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#f5c84222,#f5c84210);color:var(--gold);border:1px solid #f5c84225}
.nav-icon{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sidebar-user{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#000;flex-shrink:0}
.s-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-pts{font-size:11px;color:var(--gold)}
.s-logout{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;font-size:18px}
.s-logout:hover{color:var(--red)}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border2);z-index:50;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.bn-inner{display:flex;justify-content:space-around;align-items:center}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;border:none;background:none;color:var(--text3);cursor:pointer;transition:color .15s;min-width:52px;position:relative}
.bn-item.active{color:var(--gold)}
.bn-icon{font-size:20px;line-height:1}
.bn-label{font-size:10px;font-weight:600}
.bn-badge{position:absolute;top:0;right:6px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}

/* TOPBAR */
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card);flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-balance{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
.topbar-notif{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:16px}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--card)}

/* MAIN */
.main-content{flex:1;overflow:hidden;background:var(--bg);display:flex;flex-direction:column}
.page-scroll{flex:1;overflow-y:auto}
.page-header{padding:22px 20px 0;margin-bottom:18px}
.page-title{font-size:22px;font-weight:800}.page-title span{color:var(--gold)}
.page-sub{color:var(--text2);font-size:13px;margin-top:2px}
.page-body{padding:0 16px 100px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-lbl{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.stat-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px}
.si-gold{background:#f5c84215;color:var(--gold)}
.si-green{background:#00d08415;color:var(--green)}
.si-blue{background:#4f8ef715;color:var(--blue)}
.si-purple{background:#a855f715;color:var(--purple)}
.si-red{background:#ff4d6a15;color:var(--red)}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.stat-chg{font-size:12px;margin-top:5px;color:var(--green)}

/* ADS */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.ads-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ad-card:hover{border-color:var(--border2)}
.ad-card.watched{opacity:.5}
.ad-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.ad-cat{position:absolute;top:8px;left:8px;background:#0009;border-radius:5px;padding:2px 7px;font-size:10px;color:var(--text2);font-weight:500}
.ad-rew{position:absolute;top:8px;right:8px;background:var(--gold);color:#000;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700}
.ad-body{padding:12px}
.ad-title{font-weight:600;font-size:13px;margin-bottom:3px}
.ad-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.4}
.ad-meta{display:flex;align-items:center;justify-content:space-between}
.ad-dur{font-size:11px;color:var(--text3)}
.btn-watch{background:var(--gold);color:#000;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-watch:hover{background:var(--gold2)}
.btn-watched{background:var(--bg3);color:var(--green);border:1px solid var(--green);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:default}

/* PROGRESS */
.prog-wrap{background:var(--bg3);border-radius:100px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:100px;transition:width .4s}

/* REFERRAL GATE */
.ref-gate{background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.ref-gate-icon{font-size:44px;margin-bottom:10px}
.ref-gate-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.ref-gate-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.ref-gate-prog{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ref-gate-count{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--gold);white-space:nowrap}

/* LEADERBOARD */
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.lb-hdr{display:grid;grid-template-columns:44px 1fr 90px 90px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.lb-row{display:grid;grid-template-columns:44px 1fr 90px 90px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:linear-gradient(90deg,#f5c84210,transparent)}
.lb-rank{font-family:'Syne',sans-serif;font-weight:800;font-size:14px}
.rank-gold{color:var(--gold)}.rank-silver{color:#aaa}.rank-bronze{color:#cd7f32}
.lb-user{display:flex;align-items:center;gap:8px}
.lb-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lb-name{font-size:13px;font-weight:500}
.lb-you{font-size:9px;background:var(--gold);color:#000;border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:700}
.lb-score{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.lb-usdt{font-size:12px;color:var(--green);font-weight:600}

/* WITHDRAW */
.w-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.w-bal{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--gold)}
.w-lbl{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block}
.w-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.w-input:focus{border-color:var(--gold)}
.btn-green{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:4px;transition:background .2s}
.btn-green:hover{background:var(--green2)}

/* PROFILE */

.prof-avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;margin:0 auto 12px;font-family:'Syne',sans-serif}
.prof-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;border-top:1px solid var(--border);padding-top:16px;margin-top:16px}

.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}

/* MISC */
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text2)}

.ref-box{background:var(--bg3);border:1px dashed var(--border2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ref-code{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.btn-copy{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.btn-copy:hover{border-color:var(--gold);color:var(--gold)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:14px;display:flex;align-items:center;gap:8px;z-index:999;white-space:nowrap;box-shadow:0 8px 24px #0006;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── Firebase init ──────────────────────────────────────────────────────────
let auth=null, db=null, fbReady=false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth=firebase.auth(); db=firebase.firestore(); fbReady=true;
} catch(e){ console.warn('Firebase:',e); }

// ── Helpers ────────────────────────────────────────────────────────────────
const fmtDate = ()=>new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
const todayKey = ()=>new Date().toISOString().slice(0,10); // "2025-05-21"

function Toast({msg,icon}){ return <div className="toast"><span>{icon}</span>{msg}</div>; }
function Splash({text}){ return(
  <div className="splash">
    <div className="splash-logo">A</div>
    <div className="splash-text">Ad<span>Earn</span></div>
    <div className="spinner"/>
    {text&&<div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>{text}</div>}
  </div>
);}

// ── AUTH PAGE ──────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',refCode:''});
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [busy,setBusy]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  async function submit(e){
    e.preventDefault(); setErr(''); setOk(''); setBusy(true);
    const email=form.email.trim().toLowerCase();
    const pass=form.password;

    if(mode==='forgot'){
      if(!email){setErr('Enter your email.');setBusy(false);return;}
      try{ await auth.sendPasswordResetEmail(email); setOk('✅ Reset email sent! Check your inbox.'); setMode('login'); }
      catch(ex){ setErr(ex.code==='auth/user-not-found'?'No account with this email.':'Failed. Try again.'); }
      setBusy(false); return;
    }

    if(!email||!pass){setErr('Fill all fields.');setBusy(false);return;}
    if(pass.length<6){setErr('Password must be 6+ characters.');setBusy(false);return;}

    try {
      if(mode==='register'){
        if(!form.name.trim()){setErr('Enter your name.');setBusy(false);return;}
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:form.name.trim()});

        // Generate unique referral code from uid
        const refCode='AE'+cred.user.uid.slice(0,6).toUpperCase();

        // Check if they used someone's referral code
        let referredBy=null;
        const enteredCode=form.refCode.trim().toUpperCase();
        if(enteredCode){
          const codeSnap=await db.collection('refCodes').doc(enteredCode).get();
          if(codeSnap.exists){ referredBy=codeSnap.data().uid; }
        }

        // Save user doc
        await db.collection('users').doc(cred.user.uid).set({
          name:form.name.trim(), email,
          score:0, refCode,
          referralCount:0, referralUnlocked:false,
          watchedByDate:{}, withdrawals:[],
          joinedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Save referral code lookup
        await db.collection('refCodes').doc(refCode).set({uid:cred.user.uid});

        // Credit referrer
        if(referredBy){
          const referrerRef=db.collection('users').doc(referredBy);
          await db.runTransaction(async t=>{
            const doc=await t.get(referrerRef);
            const cur=doc.data().referralCount||0;
            const newCount=cur+1;
            const unlocked=newCount>=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW;
            t.update(referrerRef,{
              referralCount:newCount,
              referralUnlocked:unlocked,
              score:firebase.firestore.FieldValue.increment(CONFIG.REFERRAL_BONUS_PTS)
            });
          });
          // Bonus for new user too
          await db.collection('users').doc(cred.user.uid).update({
            score:CONFIG.REFERRAL_BONUS_PTS
          });
        }

        onLogin({uid:cred.user.uid,name:form.name.trim(),email,score:referredBy?CONFIG.REFERRAL_BONUS_PTS:0,
          refCode,referralCount:0,referralUnlocked:false,watchedByDate:{},withdrawals:[]});

      } else {
        const cred=await auth.signInWithEmailAndPassword(email,pass);
        const snap=await db.collection('users').doc(cred.user.uid).get();
        const d=snap.data()||{};
        onLogin({uid:cred.user.uid,name:d.name||email.split('@')[0],email,
          score:d.score||0,refCode:d.refCode||'',
          referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
          watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
      }
    } catch(ex){
      const msgs={
        'auth/email-already-in-use':'Email already registered. Sign in instead.',
        'auth/user-not-found':'No account with this email. Register first.',
        'auth/wrong-password':'Wrong password. Try again or reset it.',
        'auth/invalid-email':'Invalid email address.',
        'auth/too-many-requests':'Too many attempts. Try again later.',
      };
      setErr(msgs[ex.code]||ex.message);
    }
    setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">A</div>
          <div className="auth-logo-text">Ad<span>Earn</span></div>
        </div>
        <h2 className="auth-title">
          {mode==='login'?'Welcome Back':mode==='register'?'Create Account':'Reset Password'}
        </h2>
        <p className="auth-sub">
          {mode==='login'?'Sign in to start earning Rupees'
          :mode==='register'?'Join and earn Rupees watching ads'
          :'Enter your email to receive a reset link'}
        </p>
        <form onSubmit={submit}>
          {err&&<div className="msg-error">⚠️ {err}</div>}
          {ok&&<div className="msg-success">{ok}</div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="Hamza Khan" value={form.name} onChange={set('name')}/>
          </div>}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} autoComplete="email"/>
          </div>
          {mode!=='forgot'&&<div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min 6 characters" value={form.password} onChange={set('password')}/>
          </div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Referral Code <span className="form-input-optional">(optional)</span></label>
            <input className="form-input" placeholder="e.g. AEABC123" value={form.refCode} onChange={set('refCode')}/>
          </div>}
          {mode==='login'&&<div className="auth-forgot">
            <button type="button" onClick={()=>{setErr('');setOk('');setMode('forgot');}}>Forgot password?</button>
          </div>}
          <button className="btn-gold" type="submit" disabled={busy}>
            {busy?'⏳ Please wait…':mode==='login'?'Sign In →':mode==='register'?'Create Account →':'Send Reset Email →'}
          </button>
          {mode==='forgot'&&<button className="btn-outline" type="button" onClick={()=>{setErr('');setOk('');setMode('login');}}>← Back to Sign In</button>}
        </form>
        {mode!=='forgot'&&<div className="auth-switch">
          {mode==='login'
            ?<>No account? <button onClick={()=>{setErr('');setOk('');setMode('register');}}>Register here</button></>
            :<>Have account? <button onClick={()=>{setErr('');setOk('');setMode('login');}}>Sign In</button></>}
        </div>}
      </div>
    </div>
  );
}

// ── AD MODAL ───────────────────────────────────────────────────────────────
function AdModal({ad,onClose,onComplete}){
  const [phase,setPhase]=useState('preview');
  const [timer,setTimer]=useState(ad.duration);
  const [progress,setProgress]=useState(0);
  useEffect(()=>{
    if(phase!=='watching')return;
    const iv=setInterval(()=>{
      setTimer(t=>{ if(t<=1){clearInterval(iv);setPhase('done');return 0;} return t-1; });
      setProgress(p=>Math.min(100,p+(100/ad.duration)));
    },1000);
    return()=>clearInterval(iv);
  },[phase]);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&phase!=='watching'&&onClose()}>
      <div className="modal-box">
        <div className="modal-handle"/>
        {phase!=='watching'&&<button className="modal-close" onClick={()=>phase!=='watching'&&onClose()}>✕</button>}
        {phase==='preview'&&<>
          <div className="modal-title">{ad.title}</div>
          <div className="modal-sub">{ad.cat} · {ad.duration}s · +{ad.reward} pts</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}}>{ad.emoji}</span>
            <span style={{fontSize:12,color:'var(--text2)',marginTop:6,padding:'0 16px',textAlign:'center'}}>{ad.desc}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>⏱ {ad.duration}s watch time</span>
            <span className="chip chip-gold">+{ad.reward} pts</span>
          </div>
          <button className="btn-modal" onClick={()=>setPhase('watching')}>▶ Watch Ad</button>
        </>}
        {phase==='watching'&&<>
          <div className="modal-title">Watching Ad…</div>
          <div className="modal-sub">Don't close this window</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}} className="pulse">{ad.emoji}</span>
            <div className="ad-countdown">{timer}</div>
          </div>
          <div className="prog-wrap" style={{marginBottom:10}}>
            <div className="prog-fill" style={{width:progress+'%'}}/>
          </div>
          <p style={{textAlign:'center',fontSize:13,color:'var(--text2)'}}>{timer}s remaining…</p>
        </>}
        {phase==='done'&&<>
          <div style={{textAlign:'center',paddingTop:4}}>
            <div style={{fontSize:48,marginBottom:8}}>🎉</div>
            <div className="modal-title">Ad Complete!</div>
            <div className="modal-sub">Points credited to your balance</div>
            <div className="modal-reward">+{ad.reward}</div>
            <div style={{fontSize:13,color:'var(--text2)',textAlign:'center',marginBottom:4}}>points earned</div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 16px',marginBottom:18,fontSize:13,color:'var(--text2)'}}>
              {`≈ Rs. ${(ad.reward/CONFIG.POINTS_PER_PKR).toFixed(1)} Rupees equivalent`}
            </div>
            <button className="btn-modal" onClick={()=>onComplete(ad)}>Claim & Next Ad →</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({user,todayWatched,score,onWatchAd,visibleAds}){
  const goal=CONFIG.DAILY_AD_GOAL;
  const watchedToday=todayWatched.length;
  return(
    <div>
      <div className="page-header">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <h1 className="page-title">Hello, <span>{user.name.split(' ')[0]}</span> 👋</h1>
            <p className="page-sub">Watch ads · Earn Rupees · Refer friends</p>
          </div>
          <span className={`chip ${user.referralUnlocked?'chip-green':'chip-gold'}`}>
            {user.referralUnlocked?'✅ Withdrawal Unlocked':'🔒 '+user.referralCount+'/'+CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW+' Referrals'}
          </span>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-lbl">Total Score<div className={`stat-icon si-gold`}>⭐</div></div>
            <div className="stat-val">{score.toLocaleString()}</div>
            <div className="stat-chg">↑ +{todayWatched.reduce((s,a)=>s+a.reward,0)} today</div>
          </div>
          <div className="stat-card">
            <div className="stat-lbl">Balance<div className="stat-icon si-green">💵</div></div>
            <div className="stat-val" style={{color:'var(--green)',fontSize:20}}>{`Rs. ${Math.floor(score/CONFIG.POINTS_PER_PKR)}`}</div>
            <div className="stat-chg">{user.referralUnlocked?'Withdrawable':'Unlock via 10 referrals'}</div>
          </div>
          <div className="stat-card">
            <div className="stat-lbl">Ads Today<div className="stat-icon si-blue">📺</div></div>
            <div className="stat-val">{watchedToday}</div>
            <div className="stat-chg">↑ of {goal} goal</div>
          </div>
          <div className="stat-card">
            <div className="stat-lbl">Referrals<div className="stat-icon si-purple">👥</div></div>
            <div className="stat-val">{user.referralCount}</div>
            <div className="stat-chg">{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW-user.referralCount} more to unlock</div>
          </div>
        </div>

// ── ADMIN PANEL ────────────────────────────────────────────────────────────
function AdminPanel({currentUser,onBack}){
  const [tab,setTab]=useState('overview');
  const [users,setUsers]=useState([]);
  const [withdrawals,setWithdrawals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [toast,setToast]=useState(null);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  useEffect(()=>{
    if(!fbReady)return;
    setLoading(true);
    // Load all users from Firestore
    db.collection('users').get().then(snap=>{
      const list=[];
      const wdList=[];
      snap.forEach(doc=>{
        const d={id:doc.id,...doc.data()};
        list.push(d);
        // Collect all withdrawals with user info
        if(d.withdrawals&&d.withdrawals.length>0){
          d.withdrawals.forEach((w,i)=>{
            wdList.push({...w,userName:d.name,userEmail:d.email,userId:doc.id,wIndex:i});
          });
        }
      });
      list.sort((a,b)=>(b.score||0)-(a.score||0));
      wdList.sort((a,b)=>(b.ts||0)-(a.ts||0));
      setUsers(list);
      setWithdrawals(wdList);
      setLoading(false);
    }).catch(e=>{console.error(e);setLoading(false);});
  },[]);

  // Stats
  const totalUsers=users.length;
  const totalScore=users.reduce((s,u)=>s+(u.score||0),0);
  const totalPKR=Math.floor(totalScore/CONFIG.POINTS_PER_PKR);
  const pendingWDs=withdrawals.filter(w=>w.status==='pending');
  const totalPaid=withdrawals.filter(w=>w.status==='paid').reduce((s,w)=>s+parseFloat(w.amount||0),0).toFixed(2);

  // Mark withdrawal as paid
  async function markPaid(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'paid'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'paid'}:w
      ));
      showToast(`Marked $${wd.amount} as paid ✅`,'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Mark withdrawal as failed
  async function markFailed(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'failed'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'failed'}:w
      ));
      showToast(`Marked as failed`,'⚠️');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Ban/unban user (set score to 0 and flag)
  async function toggleBan(u){
    try{
      const banned=!u.banned;
      await db.collection('users').doc(u.id).update({banned});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,banned}:x));
      showToast(banned?`${u.name} banned`:`${u.name} unbanned`,banned?'🚫':'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Unlock withdrawal for a user manually
  async function unlockWithdraw(u){
    try{
      await db.collection('users').doc(u.id).update({referralUnlocked:true});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,referralUnlocked:true}:x));
      showToast(`Withdrawal unlocked for ${u.name}`,'🔓');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  const filteredUsers=users.filter(u=>
    u.name?.toLowerCase().includes(search.toLowerCase())||
    u.email?.toLowerCase().includes(search.toLowerCase())
  );

  const filteredWDs=withdrawals.filter(w=>
    tab==='pending'?w.status==='pending':true
  ).filter(w=>
    w.userName?.toLowerCase().includes(search.toLowerCase())||
    w.userEmail?.toLowerCase().includes(search.toLowerCase())
  );

  if(loading) return <Splash text="Loading admin data…"/>;

  return(
    <div className="admin-wrap">
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
      <div className="admin-topbar">
        <div>
          <div className="admin-title">⚙️ Admin <span>Panel</span></div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>Manage users, withdrawals and platform data</div>
        </div>
        <button onClick={onBack} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'9px 18px',color:'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          ← Back to Site
        </button>
      </div>

      {/* Stats */}
      <div className="admin-stats">
        <div className="admin-stat">
          <div className="admin-stat-lbl">👥 Total Users</div>
          <div className="admin-stat-val" style={{color:'var(--blue)'}}>{totalUsers}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⭐ Total Score</div>
          <div className="admin-stat-val" style={{color:'var(--gold)'}}>{totalScore.toLocaleString()}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⏳ Pending WDs</div>
          <div className="admin-stat-val" style={{color:'var(--red)'}}>{pendingWDs.length}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">💸 Total Paid</div>
          <div className="admin-stat-val" style={{color:'var(--green)'}}>{`Rs. ${totalPaid}`}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="admin-tabs">
        {[
          {id:'overview',label:'👥 All Users'},
          {id:'pending',label:`⏳ Pending (${pendingWDs.length})`},
          {id:'withdrawals',label:'💸 All Withdrawals'},
        ].map(t=>(
          <button key={t.id} className={`admin-tab ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);setSearch('');}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Search */}
      <input className="admin-search" placeholder="🔍 Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)}/>

      {/* USERS TABLE */}
      {tab==='overview'&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-users-hdr">
            <div>User</div><div>Email</div><div>Score</div><div>Refs</div><div>Status</div><div>Actions</div>
          </div>
          {filteredUsers.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>No users found</div>}
          {filteredUsers.map(u=>(
            <div className="admin-table-row admin-users-row" key={u.id}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{u.id.slice(0,10)}…</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{u.email}</div>
              <div style={{fontFamily:'Syne',fontWeight:700,color:'var(--gold)'}}>{(u.score||0).toLocaleString()}</div>
              <div style={{textAlign:'center'}}>{u.referralCount||0}</div>
              <div>
                {u.banned
                  ?<span className="admin-badge" style={{background:'#ff4d6a20',color:'var(--red)'}}>Banned</span>
                  :u.referralUnlocked
                    ?<span className="admin-badge" style={{background:'#00d08420',color:'var(--green)'}}>Unlocked</span>
                    :<span className="admin-badge" style={{background:'#f5c84220',color:'var(--gold)'}}>Locked</span>}
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {!u.referralUnlocked&&!u.banned&&(
                  <button className="admin-btn admin-btn-green" onClick={()=>unlockWithdraw(u)}>🔓 Unlock</button>
                )}
                <button className={`admin-btn ${u.banned?'admin-btn-green':'admin-btn-red'}`} onClick={()=>toggleBan(u)}>
                  {u.banned?'✅ Unban':'🚫 Ban'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* WITHDRAWALS TABLE */}
      {(tab==='withdrawals'||tab==='pending')&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-wd-hdr">
            <div>User</div><div>Date</div><div>Score</div><div>Amount</div><div>Status</div><div>Actions</div>
          </div>
          {filteredWDs.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>
            {tab==='pending'?'No pending withdrawals 🎉':'No withdrawals yet'}
          </div>}
          {filteredWDs.map((w,i)=>(
            <div className="admin-table-row admin-wd-row" key={i}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{w.userName}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{w.userEmail}</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{w.date}</div>
              <div style={{fontSize:12}}>{w.score?.toLocaleString()}</div>
              <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--green)'}}>${w.amount}</div>
              <div>
                <span className={`admin-badge ${
                  w.status==='paid'?'badge-paid':w.status==='failed'?'badge-failed':'badge-pending'
                }`} style={{
                  background:w.status==='paid'?'#00d08420':w.status==='failed'?'#ff4d6a20':'#f5c84220',
                  color:w.status==='paid'?'var(--green)':w.status==='failed'?'var(--red)':'var(--gold)'
                }}>
                  {w.status.charAt(0).toUpperCase()+w.status.slice(1)}
                </span>
              </div>
              <div style={{display:'flex',gap:5}}>
                {w.status==='pending'&&<>
                  <button className="admin-btn admin-btn-green" onClick={()=>markPaid(w)}>✅ Paid</button>
                  <button className="admin-btn admin-btn-red" onClick={()=>markFailed(w)}>❌ Fail</button>
                </>}
                {w.status!=='pending'&&<span style={{fontSize:12,color:'var(--text3)'}}>Done</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Quick info */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:18,fontSize:13,color:'var(--text2)',lineHeight:2}}>
        <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:8}}>📋 Quick Guide</div>
        <div>✅ <strong style={{color:'var(--text)'}}>Paid</strong> — User sent money, mark after you send payment to their wallet</div>
        <div>❌ <strong style={{color:'var(--text)'}}>Fail</strong> — Wrong address or rejected, user will see failed status</div>
        <div>🔓 <strong style={{color:'var(--text)'}}>Unlock</strong> — Manually unlock withdrawal for a user without 10 referrals</div>
        <div>🚫 <strong style={{color:'var(--text)'}}>Ban</strong> — Disable a suspicious or fraudulent account</div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',  label:'Home',     icon:'🏠'},
  {id:'earn',       label:'Earn',     icon:'▶️'},
  {id:'offers',     label:'Offers',   icon:'🎯'},
  {id:'leaderboard',label:'Ranks',    icon:'🏆'},
  {id:'withdraw',   label:'Withdraw', icon:'💸'},
  {id:'profile',    label:'Profile',  icon:'👤'},
];

function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [adminMode,setAdminMode]=useState(false);
  const [score,setScore]=useState(0);
  const [watchedByDate,setWatchedByDate]=useState({});
  const [watching,setWatching]=useState(null);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!fbReady){setLoading(false);return;}
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap=await db.collection('users').doc(fbUser.uid).get();
          const d=snap.data()||{};
          // Auto-generate refCode if missing (existing accounts)
          let refCode=d.refCode||'';
          if(!refCode){
            refCode='AE'+fbUser.uid.slice(0,6).toUpperCase();
            // Save it back to Firestore
            await db.collection('users').doc(fbUser.uid).set(
              {refCode},
              {merge:true}
            );
            // Save lookup
            await db.collection('refCodes').doc(refCode).set({uid:fbUser.uid});
          }
          setUser({uid:fbUser.uid,name:d.name||fbUser.displayName||fbUser.email.split('@')[0],email:fbUser.email,
            score:d.score||0,refCode,
            referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
            watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
          setScore(d.score||0);
          setWatchedByDate(d.watchedByDate||{});
        }catch(e){console.error(e);}
      } else { setUser(null); }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  // Build today's visible ads (fresh set each day)
  const today=todayKey();
  const todayWatchedIds=(watchedByDate[today]||[]);
  // Rotate through ALL_ADS — show CONFIG.ADS in batches, cycling
  const visibleAds=CONFIG.ADS.map(ad=>({...ad,watched:todayWatchedIds.includes(ad.id)}));
  const todayWatched=visibleAds.filter(a=>a.watched);

  async function handleAdComplete(ad){
    const newWatchedIds=[...todayWatchedIds,ad.id];
    const newWatchedByDate={...watchedByDate,[today]:newWatchedIds};
    const newScore=score+ad.reward;

    // Bonus if daily goal just reached
    const justReachedGoal=newWatchedIds.length===CONFIG.DAILY_AD_GOAL&&todayWatchedIds.length<CONFIG.DAILY_AD_GOAL;
    const finalScore=justReachedGoal?newScore+CONFIG.BONUS_ON_GOAL:newScore;

    setScore(finalScore);
    setWatchedByDate(newWatchedByDate);
    setWatching(null);

    if(justReachedGoal) showToast(`Daily goal reached! +${CONFIG.BONUS_ON_GOAL} bonus pts! 🎯`,'🎯');
    else showToast(`+${ad.reward} points earned!`,'🎉');

    // Save to Firestore
    if(fbReady&&user?.uid){
      setSaving(true);
      try{ await db.collection('users').doc(user.uid).update({score:finalScore,watchedByDate:newWatchedByDate}); }
      catch(e){console.error(e);}
      setSaving(false);
    }
  }

  async function handleWithdrawal(record){
    const newWithdrawals=[...(user.withdrawals||[]),record];
    setUser(u=>({...u,withdrawals:newWithdrawals}));
    if(fbReady&&user?.uid){
      try{ await db.collection('users').doc(user.uid).update({withdrawals:newWithdrawals}); }
      catch(e){console.error(e);}
    }
  }

  async function handleSignOut(){
    if(fbReady)await auth.signOut();
    setUser(null);setScore(0);setWatchedByDate({});setPage('dashboard');
  }

  function handleLogin(u){
    setUser(u);setScore(u.score||0);setWatchedByDate(u.watchedByDate||{});
  }

  if(loading)return <Splash text="Loading your account…"/>;
  if(!user)return <AuthPage onLogin={handleLogin}/>;
  if(adminMode)return <AdminPanel currentUser={user} onBack={()=>setAdminMode(false)}/>;

  const isAdmin=user.email===CONFIG.ADMIN_EMAIL;
  const unwatched=visibleAds.filter(a=>!a.watched).length;
  const navLabel=n=>
    n.id==='earn'?'Watch & Earn':
    n.id==='offers'?'Real Offers':
    n.id==='leaderboard'?'Leaderboard':n.label;

  return(
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">A</div>
          <div className="sidebar-logo-text">Ad<span>Earn</span></div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-lbl">Menu</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {navLabel(n)}
              {n.id==='earn'&&unwatched>0&&<span className="nav-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="nav-badge">🔒</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="nav-item" onClick={()=>setAdminMode(true)}
              style={{marginTop:8,background:'#ff4d6a15',color:'var(--red)',border:'1px solid #ff4d6a30'}}>
              <span className="nav-icon">⚙️</span>Admin Panel
            </button>
          )}
        </div>
        <div className="sidebar-user">
          <div className="s-avatar">{user.name.slice(0,2).toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="s-name">{user.name}{saving&&<span className="saving-dot"/>}</div>
            <div className="s-pts">⭐ {score.toLocaleString()} pts</div>
          </div>
          <button className="s-logout" onClick={handleSignOut} title="Sign Out">⏻</button>
        </div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{navLabel(NAV.find(n=>n.id===page)||NAV[0])}</div>
          <div className="topbar-right">
            {isAdmin&&(
              <button onClick={()=>setAdminMode(true)}
                style={{background:'#ff4d6a20',border:'1px solid #ff4d6a40',borderRadius:10,padding:'7px 12px',color:'var(--red)',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ⚙️ Admin
              </button>
            )}
            <div className="topbar-balance">
              <span style={{color:'var(--green)'}}>💵</span>
              <span style={{color:'var(--green)',fontWeight:700}}>{`Rs. ${Math.floor(score/CONFIG.POINTS_PER_PKR)}`}</span>
            </div>
            <div className="topbar-notif">🔔<span className="notif-dot"/></div>
          </div>
        </div>

        <div className="page-scroll">
          {page==='dashboard'  &&<Dashboard    user={user} todayWatched={todayWatched} score={score} onWatchAd={setWatching} visibleAds={visibleAds}/>}
          {page==='earn'       &&<EarnPage      visibleAds={visibleAds} onWatchAd={setWatching}/>}
          {page==='offers'     &&<OfferwallPage user={user} showToast={showToast}/>}
          {page==='leaderboard'&&<LeaderboardPage score={score}/>}
          {page==='withdraw'   &&<WithdrawPage  user={user} score={score} showToast={showToast} onWithdrawal={handleWithdrawal}/>}
          {page==='profile'    &&<ProfilePage   user={user} score={score} onSignOut={handleSignOut}/>}
        </div>
      </div>

      <div className="bottom-nav">
        <div className="bn-inner">
          {NAV.map(n=>(
            <button key={n.id} className={`bn-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              {n.id==='earn'&&unwatched>0&&<span className="bn-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="bn-badge">🔒</span>}
              <span className="bn-icon">{n.icon}</span>
              <span className="bn-label">{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      {watching&&<AdModal ad={watching} onClose={()=>setWatching(null)} onComplete={handleAdComplete}/>}
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
