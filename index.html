<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>AdEarn — Elite Earning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000000;
  --void:#03020a;
  --deep:#070512;
  --surface:#0e0c1a;
  --panel:#130f20;
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.07);
  --card-border-hover:rgba(255,215,0,0.3);
  --gold:#FFD700;
  --gold-dim:#C9A227;
  --gold-glow:rgba(255,215,0,0.15);
  --cyan:#00E5FF;
  --cyan-dim:#00B8CC;
  --cyan-glow:rgba(0,229,255,0.12);
  --red:#FF2D55;
  --green:#00FF94;
  --purple:#9D4EDD;
  --text:#F0EEFF;
  --text-dim:#6B6585;
  --text-muted:#3D3856;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-gold:0 0 40px rgba(255,215,0,0.2),0 0 80px rgba(255,215,0,0.05);
  --shadow-cyan:0 0 40px rgba(0,229,255,0.15),0 0 80px rgba(0,229,255,0.05);
  --shadow-card:0 25px 50px rgba(0,0,0,0.5);
  --r:16px;
  --r-lg:24px;
}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{
  background:var(--void);color:var(--text);
  font-family:var(--font-body);font-size:14px;
  line-height:1.6;-webkit-font-smoothing:antialiased;
  cursor:none;overflow:hidden;
}
button,input,select,textarea{font-family:var(--font-body);cursor:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* ═══════════════════════════════════════════
   NOISE GRAIN OVERLAY
═══════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:-50%;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;pointer-events:none;z-index:999;animation:grain 0.5s steps(2) infinite;
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-2%,-3%)}
  20%{transform:translate(2%,3%)}
  30%{transform:translate(-3%,1%)}
  40%{transform:translate(3%,-2%)}
  50%{transform:translate(-1%,3%)}
  60%{transform:translate(1%,-1%)}
  70%{transform:translate(-2%,2%)}
  80%{transform:translate(2%,-3%)}
  90%{transform:translate(-1%,1%)}
}

/* SCANLINES */
body::after{
  content:'';position:fixed;inset:0;z-index:998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

/* ═══════════════════════════════════════════
   AURORA BACKGROUND
═══════════════════════════════════════════ */
#aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.aurora-blob{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:auroraFloat 12s ease-in-out infinite;opacity:.15;
}
.ab1{width:600px;height:400px;background:radial-gradient(circle,#FFD700,transparent);top:-10%;left:-10%;animation-delay:0s}
.ab2{width:500px;height:500px;background:radial-gradient(circle,#00E5FF,transparent);top:20%;right:-15%;animation-delay:-4s}
.ab3{width:400px;height:600px;background:radial-gradient(circle,#9D4EDD,transparent);bottom:-20%;left:20%;animation-delay:-8s}
.ab4{width:300px;height:300px;background:radial-gradient(circle,#FFD700,transparent);bottom:10%;right:10%;animation-delay:-2s;opacity:.08}
@keyframes auroraFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.05)}
  66%{transform:translate(-20px,30px) scale(.95)}
}

/* THREE.JS CANVAS */
#three-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5}

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
#cur{
  position:fixed;z-index:10000;pointer-events:none;
  width:8px;height:8px;background:var(--gold);border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 15px var(--gold),0 0 30px rgba(255,215,0,0.3);
  transition:transform .1s;
}
#cur-ring{
  position:fixed;z-index:9999;pointer-events:none;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,215,0,0.5);
  transform:translate(-50%,-50%);
  transition:transform .12s ease;
}

/* ═══════════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════════ */
.app-layout{
  display:flex;height:100vh;width:100vw;
  position:relative;z-index:10;overflow:hidden;
}

/* ═══════════════════════════════════════════
   SIDEBAR — ELITE
═══════════════════════════════════════════ */
.sidebar{
  width:220px;min-width:220px;
  display:flex;flex-direction:column;
  background:rgba(7,5,18,0.95);
  border-right:1px solid rgba(255,215,0,0.08);
  backdrop-filter:blur(40px);
  position:relative;z-index:20;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent 0%,var(--gold) 30%,var(--cyan) 70%,transparent 100%);
  opacity:.2;
}
.sidebar-logo{
  padding:28px 20px 24px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:12px;
}
.logo-mark{
  width:38px;height:38px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:18px;color:#000;font-weight:900;
  box-shadow:var(--shadow-gold);
}
.logo-text{font-family:var(--font-display);font-size:22px;letter-spacing:2px;color:var(--text)}
.logo-text em{
  color:transparent;
  -webkit-text-stroke:1px var(--gold);
  font-style:normal;
}

/* Glitch effect on logo */
.logo-text{position:relative;animation:glitchText 8s infinite}
@keyframes glitchText{
  0%,94%,100%{opacity:1;transform:none;text-shadow:none}
  95%{opacity:.8;transform:skewX(-5deg);text-shadow:2px 0 var(--cyan),-2px 0 var(--gold)}
  96%{opacity:1;transform:skewX(3deg);text-shadow:-2px 0 var(--cyan),2px 0 var(--gold)}
  97%{opacity:.9;transform:skewX(-2deg);text-shadow:none}
  98%{opacity:1;transform:none;text-shadow:1px 0 var(--cyan)}
}

.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section{margin-bottom:6px}
.nav-label{
  font-size:9px;letter-spacing:3px;color:var(--text-muted);
  font-family:var(--font-mono);text-transform:uppercase;
  padding:6px 10px 4px;display:block;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:10px;
  color:var(--text-dim);font-size:13px;font-weight:500;
  border:none;background:none;width:100%;text-align:left;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;margin-bottom:2px;cursor:none;
  overflow:hidden;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:0;
  background:linear-gradient(180deg,var(--gold),var(--cyan));
  border-radius:0 2px 2px 0;
  transition:height .3s cubic-bezier(.4,0,.2,1);
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{
  color:var(--gold);
  background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);
}
.nav-item.active::before{height:70%}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-text{flex:1;letter-spacing:.3px}
.nav-badge{
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  font-family:var(--font-mono);
  box-shadow:0 0 10px rgba(255,45,85,0.4);
}
.nav-lock{font-size:11px;color:var(--text-muted)}
.nav-admin{color:var(--red)!important;background:rgba(255,45,85,0.06)!important}

/* Sidebar user */
.sidebar-footer{
  padding:16px 20px;border-top:1px solid rgba(255,255,255,0.05);
}
.sidebar-user{display:flex;align-items:center;gap:10px}
.user-hex{
  width:38px;height:38px;flex-shrink:0;position:relative;
}
.user-hex-inner{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#000;
  font-family:var(--font-mono);
  box-shadow:var(--shadow-gold);
}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.user-pts{font-size:10px;color:var(--gold);font-family:var(--font-mono);letter-spacing:.5px;margin-top:2px}
.user-level-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:6px}
.user-level-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:2px;transition:width .6s ease}
.btn-logout{
  background:none;border:none;color:var(--text-muted);
  font-size:16px;padding:6px;border-radius:8px;
  transition:all .2s;display:flex;
}
.btn-logout:hover{color:var(--red);background:rgba(255,45,85,0.08)}
.saving-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--green);margin-left:5px;
  box-shadow:0 0 8px var(--green);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════════════════════════════════
   BOTTOM NAV (mobile)
═══════════════════════════════════════════ */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  background:rgba(7,5,18,0.97);
  border-top:1px solid rgba(255,215,0,0.08);
  backdrop-filter:blur(40px);
}
.bn-inner{display:flex;justify-content:space-around;align-items:center}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 10px;border:none;background:none;
  color:var(--text-muted);transition:all .25s;position:relative;
}
.bn-item.active{color:var(--gold)}
.bn-item.active .bn-icon{filter:drop-shadow(0 0 6px var(--gold))}
.bn-icon{font-size:19px;line-height:1}
.bn-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono)}
.bn-badge{
  position:absolute;top:0;right:4px;
  background:var(--red);color:#fff;font-size:8px;
  font-weight:700;padding:1px 5px;border-radius:10px;
  box-shadow:0 0 8px rgba(255,45,85,0.5);
}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;flex-shrink:0;
  background:rgba(7,5,18,0.8);
  border-bottom:1px solid rgba(255,255,255,0.04);
  backdrop-filter:blur(40px);position:relative;z-index:15;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--cyan),var(--gold),transparent);
  opacity:.15;
}
.topbar-title{
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-balance{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:12px;
  background:rgba(0,229,255,0.06);
  border:1px solid rgba(0,229,255,0.15);
  font-family:var(--font-mono);font-size:13px;font-weight:700;
  letter-spacing:.5px;color:var(--cyan);
  box-shadow:var(--shadow-cyan);
}
.btn-admin-top{
  padding:8px 14px;border-radius:10px;border:none;
  background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.2);
  color:var(--red);font-size:11px;font-weight:700;
  font-family:var(--font-mono);letter-spacing:.5px;
  transition:all .25s;cursor:none;
}
.btn-admin-top:hover{background:rgba(255,45,85,0.15);box-shadow:0 0 15px rgba(255,45,85,0.2)}
.topbar-notif{
  width:38px;height:38px;border-radius:10px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;position:relative;cursor:none;transition:all .25s;
}
.topbar-notif:hover{border-color:rgba(255,215,0,0.2)}
.notif-dot{
  position:absolute;top:7px;right:7px;width:6px;height:6px;
  background:var(--red);border-radius:50%;
  box-shadow:0 0 8px var(--red);animation:pulse 2s infinite;
}

/* ═══════════════════════════════════════════
   MAIN & PAGES
═══════════════════════════════════════════ */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:10}
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden}

.page-enter{animation:pageIn .4s cubic-bezier(.4,0,.2,1)}
@keyframes pageIn{
  from{opacity:0;transform:translateY(16px);filter:blur(4px)}
  to{opacity:1;transform:none;filter:none}
}

.page-header{padding:32px 28px 0;margin-bottom:28px}
.page-eyebrow{
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:4px;color:var(--gold);
  text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.page-eyebrow::before{
  content:'';width:20px;height:1px;background:var(--gold);
  box-shadow:0 0 8px var(--gold);
}
.page-title{
  font-family:var(--font-display);font-size:42px;
  letter-spacing:2px;line-height:1;color:var(--text);
  text-transform:uppercase;
}
.page-title span{
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.page-sub{font-size:13px;color:var(--text-dim);margin-top:8px;font-weight:400}
.page-body{padding:0 24px 100px}

/* ═══════════════════════════════════════════
   HERO STATS — BLOOMBERG TERMINAL STYLE
═══════════════════════════════════════════ */
.hero-stats{
  display:grid;grid-template-columns:2fr 1fr 1fr;
  gap:1px;margin-bottom:24px;overflow:hidden;border-radius:20px;
  border:1px solid rgba(255,215,0,0.08);
  background:rgba(255,215,0,0.04);
}
.hero-stat{
  padding:28px 24px;background:rgba(7,5,18,0.95);
  position:relative;overflow:hidden;transition:background .3s;
}
.hero-stat:hover{background:rgba(14,12,26,0.98)}
.hero-stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .3s;
}
.hero-stat:hover::before{opacity:.3}
.hero-stat-label{
  font-family:var(--font-mono);font-size:9px;
  letter-spacing:3px;color:var(--text-muted);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.hero-stat-icon{font-size:14px;opacity:.6}
.hero-stat-value{
  font-family:var(--font-display);
  font-size:52px;letter-spacing:1px;line-height:1;
  color:var(--gold);
  text-shadow:var(--shadow-gold);
  transition:color .3s;
}
.hero-stat-value.cyan{color:var(--cyan);text-shadow:var(--shadow-cyan)}
.hero-stat-value.small{font-size:36px}
.hero-stat-change{
  font-size:11px;margin-top:8px;
  color:var(--green);font-family:var(--font-mono);
  display:flex;align-items:center;gap:4px;
}
.hero-stat-change.neutral{color:var(--text-dim)}

/* ═══════════════════════════════════════════
   CARDS — HOLOGRAPHIC TILT
═══════════════════════════════════════════ */
.tilt-card{
  border-radius:var(--r);
  border:1px solid var(--card-border);
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  transition:border-color .3s,box-shadow .3s;
  transform-style:preserve-3d;
  will-change:transform;
}
.tilt-card:hover{
  border-color:var(--card-border-hover);
  box-shadow:var(--shadow-card),0 0 30px rgba(255,215,0,0.06);
}
/* Holographic shimmer overlay */
.tilt-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(105deg,
    transparent 30%,
    rgba(255,215,0,0.04) 50%,
    transparent 70%
  );
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.tilt-card:hover::before{opacity:1}

/* ═══════════════════════════════════════════
   STAT CARDS (small 2x2)
═══════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{
  padding:18px 20px;position:relative;overflow:hidden;
  border-radius:var(--r);border:1px solid var(--card-border);
  background:rgba(13,11,22,0.95);
  transition:all .3s;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--cyan));
  transform:scaleX(0);transform-origin:left;transition:transform .4s ease;
  border-radius:0 0 var(--r) var(--r);
}
.stat-card:hover::after{transform:scaleX(1)}
.stat-card:hover{border-color:rgba(255,215,0,0.12);transform:translateY(-2px)}
.stat-lbl{
  font-family:var(--font-mono);font-size:9px;letter-spacing:2.5px;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.stat-icon{font-size:14px;opacity:.5}
.stat-val{
  font-family:var(--font-display);font-size:30px;letter-spacing:1px;
  line-height:1;color:var(--text);
}
.stat-val.gold{color:var(--gold)}
.stat-val.cyan{color:var(--cyan)}
.stat-chg{font-size:11px;margin-top:6px;color:var(--green);font-family:var(--font-mono)}
.stat-chg.dim{color:var(--text-dim)}

/* ═══════════════════════════════════════════
   PROGRESS BAR — LIQUID SHIMMER
═══════════════════════════════════════════ */
.prog-wrap{
  height:4px;background:rgba(255,255,255,0.05);
  border-radius:100px;overflow:hidden;position:relative;
}
.prog-fill{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--gold),var(--cyan),var(--gold));
  background-size:200% 100%;
  animation:liquidShimmer 2s linear infinite;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(255,215,0,0.3);
}
@keyframes liquidShimmer{
  0%{background-position:0% 0%}
  100%{background-position:200% 0%}
}

/* ═══════════════════════════════════════════
   GOAL BOX
═══════════════════════════════════════════ */
.goal-box{
  padding:22px 24px;margin-bottom:22px;
  border-radius:var(--r-lg);
  background:linear-gradient(135deg,rgba(255,215,0,0.05),rgba(0,229,255,0.03));
  border:1px solid rgba(255,215,0,0.1);
  position:relative;overflow:hidden;
}
.goal-box::after{
  content:'TARGET';
  position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-family:var(--font-display);font-size:80px;letter-spacing:4px;
  color:rgba(255,215,0,0.03);pointer-events:none;white-space:nowrap;
}

/* ═══════════════════════════════════════════
   SECTION HEADERS
═══════════════════════════════════════════ */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{
  font-family:var(--font-display);font-size:18px;
  letter-spacing:2px;color:var(--text);text-transform:uppercase;
}
.sec-badge{
  font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;
  color:var(--text-dim);text-transform:uppercase;
}

/* ═══════════════════════════════════════════
   AD CARDS
═══════════════════════════════════════════ */
.ads-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.ad-card{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--card-border);
  background:rgba(13,11,22,0.97);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
  animation:cardIn .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.97)}
  to{opacity:1;transform:none}
}
.ad-card:nth-child(1){animation-delay:.05s}
.ad-card:nth-child(2){animation-delay:.1s}
.ad-card:nth-child(3){animation-delay:.15s}
.ad-card:nth-child(4){animation-delay:.2s}
.ad-card:nth-child(5){animation-delay:.25s}
.ad-card:nth-child(6){animation-delay:.3s}
.ad-card:hover{
  border-color:rgba(255,215,0,0.2);
  transform:translateY(-4px) perspective(600px) rotateX(2deg) rotateY(-1deg);
  box-shadow:var(--shadow-card),0 0 20px rgba(255,215,0,0.05);
}
.ad-card.watched{opacity:.35;filter:grayscale(1)}
.ad-thumb{
  height:95px;display:flex;align-items:center;
  justify-content:center;font-size:34px;
  position:relative;overflow:hidden;
}
.ad-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(13,11,22,1));
}
.ad-cat{
  position:absolute;top:8px;left:8px;z-index:2;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;padding:2px 7px;
  font-size:8px;color:var(--text-dim);
  font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase;
}
.ad-rew{
  position:absolute;top:8px;right:8px;z-index:2;
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  color:#000;border-radius:6px;padding:2px 8px;
  font-size:10px;font-weight:800;font-family:var(--font-mono);
  box-shadow:0 0 12px rgba(255,215,0,0.4);
}
.ad-body{padding:12px 14px 14px}
.ad-title{font-weight:600;font-size:12px;margin-bottom:3px;color:var(--text);letter-spacing:.3px}
.ad-desc{font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.4}
.ad-meta{display:flex;align-items:center;justify-content:space-between}
.ad-dur{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:.5px}
.btn-watch{
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  color:#000;border:none;border-radius:8px;padding:6px 14px;
  font-size:10px;font-weight:800;font-family:var(--font-mono);
  letter-spacing:.5px;transition:all .25s;cursor:none;
  box-shadow:0 0 12px rgba(255,215,0,0.25);
  text-transform:uppercase;
}
.btn-watch:hover{box-shadow:0 0 20px rgba(255,215,0,0.4);transform:scale(1.05)}
.btn-watched{
  background:rgba(0,255,148,0.06);color:var(--green);
  border:1px solid rgba(0,255,148,0.2);border-radius:8px;
  padding:6px 14px;font-size:10px;font-weight:700;
  font-family:var(--font-mono);letter-spacing:.5px;cursor:default;
  text-transform:uppercase;
}

/* ═══════════════════════════════════════════
   REFERRAL
═══════════════════════════════════════════ */
.ref-box{
  background:rgba(255,215,0,0.04);border:1px dashed rgba(255,215,0,0.2);
  border-radius:14px;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;transition:all .3s;
}
.ref-box:hover{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.06)}
.ref-code{
  font-family:var(--font-mono);font-size:15px;font-weight:700;
  letter-spacing:4px;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.btn-copy{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:7px 14px;color:var(--text-dim);
  font-size:11px;cursor:none;transition:all .25s;font-weight:600;
  font-family:var(--font-mono);letter-spacing:.5px;
}
.btn-copy:hover{border-color:rgba(255,215,0,0.3);color:var(--gold)}

/* ═══════════════════════════════════════════
   CHIPS
═══════════════════════════════════════════ */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:4px 10px;font-size:10px;
  font-family:var(--font-mono);letter-spacing:.5px;
  text-transform:uppercase;color:var(--text-dim);
}
.chip-gold{background:rgba(255,215,0,0.06);border-color:rgba(255,215,0,0.2);color:var(--gold)}
.chip-green{background:rgba(0,255,148,0.06);border-color:rgba(0,255,148,0.2);color:var(--green)}
.chip-red{background:rgba(255,45,85,0.06);border-color:rgba(255,45,85,0.2);color:var(--red)}

/* ═══════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════ */
.lb-podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:10px;margin-bottom:20px}
.lb-podium-card{
  border-radius:var(--r);padding:20px 14px;text-align:center;
  background:rgba(13,11,22,0.97);border:1px solid rgba(255,255,255,0.06);
  transition:all .3s;
}
.lb-podium-card.top{
  border-color:rgba(255,215,0,0.2);
  background:linear-gradient(180deg,rgba(255,215,0,0.06),rgba(13,11,22,0.97));
  box-shadow:0 0 30px rgba(255,215,0,0.06);
}
.lb-podium-avatar{
  width:42px;height:42px;margin:0 auto 10px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;font-family:var(--font-mono);
}
.lb-card{
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px;
  background:rgba(10,8,18,0.98);border:1px solid rgba(255,255,255,0.05);
}
.lb-hdr{
  display:grid;grid-template-columns:48px 1fr 100px 100px;
  padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.04);
  font-family:var(--font-mono);font-size:9px;color:var(--text-muted);
  letter-spacing:2px;text-transform:uppercase;
}
.lb-row{
  display:grid;grid-template-columns:48px 1fr 100px 100px;
  padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.03);
  align-items:center;transition:background .2s;
}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,0.02)}
.lb-row.me{
  background:linear-gradient(90deg,rgba(255,215,0,0.05),transparent);
  border-left:2px solid var(--gold);
}
.lb-rank{font-family:var(--font-display);font-weight:400;font-size:18px;letter-spacing:1px}
.rank-gold{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.4)}
.rank-silver{color:#C0C0C0}
.rank-bronze{color:#CD7F32}
.lb-user{display:flex;align-items:center;gap:10px}
.lb-av{
  width:28px;height:28px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;font-family:var(--font-mono);
}
.lb-name{font-size:13px;font-weight:500;color:var(--text)}
.lb-you{
  font-size:8px;background:var(--gold);color:#000;
  border-radius:4px;padding:1px 6px;margin-left:5px;
  font-weight:800;font-family:var(--font-mono);letter-spacing:.5px;
}
.lb-score{
  font-family:var(--font-mono);font-size:13px;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.lb-usdt{font-family:var(--font-mono);font-size:12px;color:var(--cyan);font-weight:700}

/* ═══════════════════════════════════════════
   WITHDRAW
═══════════════════════════════════════════ */
.w-card{
  padding:28px;margin-bottom:20px;
  border-radius:var(--r-lg);
  background:rgba(10,8,18,0.98);
  border:1px solid rgba(255,255,255,0.05);
}
.w-hero{
  display:flex;align-items:flex-end;gap:16px;
  margin-bottom:24px;padding-bottom:24px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.w-bal{
  font-family:var(--font-display);
  font-size:60px;letter-spacing:2px;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
}
.w-bal-sub{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:4px}
.w-lbl{
  font-family:var(--font-mono);font-size:9px;color:var(--gold);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:block;
}
.w-input{
  width:100%;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  padding:13px 16px;color:var(--text);font-size:14px;outline:none;
  transition:all .3s;font-family:var(--font-mono);
}
.w-input:focus{
  border-color:rgba(255,215,0,0.3);
  box-shadow:0 0 0 3px rgba(255,215,0,0.06);
  background:rgba(255,215,0,0.03);
}
.w-input::placeholder{color:var(--text-muted)}
.btn-green{
  width:100%;margin-top:4px;
  background:linear-gradient(135deg,var(--green),#00CC76);
  color:#000;border:none;border-radius:12px;padding:14px;
  font-size:13px;font-weight:800;cursor:none;
  font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase;
  transition:all .3s;box-shadow:0 0 20px rgba(0,255,148,0.15);
}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,255,148,0.25)}
.hist-tbl{
  border-radius:var(--r-lg);overflow:hidden;
  background:rgba(10,8,18,0.98);border:1px solid rgba(255,255,255,0.05);
}
.hist-hdr{
  display:grid;grid-template-columns:1fr 70px 80px 80px;
  padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.04);
  font-family:var(--font-mono);font-size:9px;color:var(--text-muted);
  letter-spacing:2px;text-transform:uppercase;
}
.hist-row{
  display:grid;grid-template-columns:1fr 70px 80px 80px;
  padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.03);
  font-size:13px;align-items:center;transition:background .2s;
}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:rgba(255,255,255,0.02)}
.badge{
  font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;
  display:inline-block;font-family:var(--font-mono);letter-spacing:.5px;text-transform:uppercase;
}
.badge-pending{background:rgba(255,215,0,0.08);color:var(--gold);border:1px solid rgba(255,215,0,0.2)}
.badge-paid{background:rgba(0,255,148,0.08);color:var(--green);border:1px solid rgba(0,255,148,0.2)}
.badge-failed{background:rgba(255,45,85,0.08);color:var(--red);border:1px solid rgba(255,45,85,0.2)}

/* ═══════════════════════════════════════════
   REFERRAL GATE
═══════════════════════════════════════════ */
.ref-gate{
  border-radius:var(--r-lg);padding:36px 28px;margin-bottom:20px;
  text-align:center;
  background:linear-gradient(135deg,rgba(255,215,0,0.05),rgba(0,229,255,0.03),rgba(255,215,0,0.05));
  border:1px solid rgba(255,215,0,0.12);
  position:relative;overflow:hidden;
}
.ref-gate::before{
  content:'LOCKED';
  position:absolute;bottom:-20px;right:-20px;
  font-family:var(--font-display);font-size:100px;
  color:rgba(255,215,0,0.03);letter-spacing:4px;pointer-events:none;
}
.ref-gate-icon{font-size:52px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.3));display:block}
.ref-gate-title{
  font-family:var(--font-display);font-size:28px;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;margin-bottom:10px;
}
.ref-gate-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.8}
.ref-gate-count{
  font-family:var(--font-display);font-size:36px;color:var(--gold);
  white-space:nowrap;letter-spacing:2px;
  text-shadow:var(--shadow-gold);
}
.ref-gate-prog{display:flex;align-items:center;gap:16px;margin-bottom:12px}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
}
.modal-box{
  width:100%;max-width:480px;position:relative;
  background:linear-gradient(180deg,var(--surface),var(--void));
  border:1px solid rgba(255,215,0,0.1);border-bottom:none;
  border-radius:28px 28px 0 0;padding:32px 28px 44px;
  animation:modalUp .35s cubic-bezier(.4,0,.2,1);
}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:36px;height:3px;margin:0 auto 28px;
  background:linear-gradient(90deg,var(--gold),var(--cyan));
  border-radius:2px;box-shadow:0 0 10px rgba(255,215,0,0.4);
}
.modal-close{
  position:absolute;top:24px;right:24px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  color:var(--text-dim);width:32px;height:32px;border-radius:10px;
  cursor:none;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.modal-close:hover{border-color:rgba(255,45,85,0.3);color:var(--red)}
.modal-title{font-family:var(--font-display);font-size:24px;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.modal-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;font-family:var(--font-mono);letter-spacing:.5px}
.ad-play-area{
  border-radius:16px;height:160px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  margin-bottom:16px;position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
}
.ad-countdown{
  font-family:var(--font-display);font-size:52px;font-weight:400;
  color:var(--gold);position:absolute;right:14px;bottom:10px;
  text-shadow:var(--shadow-gold);letter-spacing:2px;
}
.modal-reward{
  font-family:var(--font-display);font-size:56px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;text-align:center;margin:12px 0 4px;
  text-transform:uppercase;
}
.btn-modal{
  width:100%;
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  color:#000;border:none;border-radius:14px;padding:15px;
  font-size:13px;font-weight:800;cursor:none;
  font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase;
  transition:all .3s;box-shadow:var(--shadow-gold);
  position:relative;overflow:hidden;
}
.btn-modal::after{
  content:'';position:absolute;top:-50%;left:-60%;
  width:30%;height:200%;
  background:rgba(255,255,255,0.25);
  transform:skewX(-20deg);
  animation:btnShine 3s infinite;
}
@keyframes btnShine{0%,100%{left:-60%}50%{left:120%}}
.btn-modal:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,215,0,0.35)}

/* PARTICLE BURST */
.particle{
  position:fixed;pointer-events:none;z-index:9998;
  width:6px;height:6px;border-radius:50%;
  animation:particleBurst .8s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* ═══════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════ */
.prof-hero{
  padding:32px 28px;margin-bottom:16px;
  border-radius:var(--r-lg);text-align:center;
  background:linear-gradient(180deg,rgba(255,215,0,0.05) 0%,rgba(10,8,18,0.98) 100%);
  border:1px solid rgba(255,215,0,0.08);
  position:relative;overflow:hidden;
}
.prof-hex{
  width:80px;height:80px;margin:0 auto 20px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:#000;
  font-family:var(--font-mono);
  box-shadow:var(--shadow-gold);
  animation:hexFloat 4s ease-in-out infinite;
}
@keyframes hexFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.prof-name{font-family:var(--font-display);font-size:28px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.prof-email{font-size:12px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:16px}
.prof-stats{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:1px;background:rgba(255,255,255,0.04);
  border-radius:12px;overflow:hidden;margin-top:20px;
  border:1px solid rgba(255,255,255,0.04);
}
.prof-stat{
  background:rgba(10,8,18,0.98);padding:16px;text-align:center;
  transition:background .25s;
}
.prof-stat:hover{background:rgba(255,215,0,0.04)}
.prof-stat-val{
  font-family:var(--font-display);font-size:24px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.prof-stat-lbl{font-size:9px;color:var(--text-muted);margin-top:3px;font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase}
.settings-sec{
  border-radius:var(--r-lg);padding:22px 24px;margin-bottom:14px;
  background:rgba(10,8,18,0.98);border:1px solid rgba(255,255,255,0.05);
}
.settings-sec h3{
  font-family:var(--font-mono);font-size:9px;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;
}
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;font-weight:500;color:var(--text)}
.set-sub{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono)}
.toggle{
  width:44px;height:24px;background:rgba(255,255,255,0.06);
  border-radius:12px;position:relative;cursor:none;
  border:1px solid rgba(255,255,255,0.08);transition:all .3s;flex-shrink:0;
}
.toggle.on{
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  border-color:transparent;box-shadow:0 0 15px rgba(255,215,0,0.2);
}
.toggle::after{
  content:'';position:absolute;width:18px;height:18px;
  background:#fff;border-radius:50%;top:2px;left:2px;
  transition:left .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.toggle.on::after{left:22px}

/* ═══════════════════════════════════════════
   AUTH PAGE
═══════════════════════════════════════════ */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 25% 50%,rgba(255,215,0,0.06) 0%,transparent 60%),
             radial-gradient(ellipse at 75% 50%,rgba(0,229,255,0.04) 0%,transparent 60%),var(--void);
}
.auth-card{
  width:100%;max-width:420px;padding:44px 40px;
  background:rgba(13,11,22,0.98);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r-lg);backdrop-filter:blur(40px);
  animation:authReveal .5s cubic-bezier(.4,0,.2,1);

<!-- Aurora Blobs -->
<div id="aurora">
  <div class="aurora-blob ab1"></div>
  <div class="aurora-blob ab2"></div>
  <div class="aurora-blob ab3"></div>
  <div class="aurora-blob ab4"></div>
</div>

<!-- Three.js Canvas -->
<canvas id="three-canvas"></canvas>

<!-- Custom Cursor -->
<div id="cur"></div>
<div id="cur-ring"></div>

<div id="root"></div>

<script>
/* ── Three.js ── */
(function(){
  try{
    const canvas=document.getElementById('three-canvas');
    const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(innerWidth,innerHeight);
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,1000);
    cam.position.z=35;

    const N=600;
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      pos[i*3]=(Math.random()-.5)*90;
      pos[i*3+1]=(Math.random()-.5)*90;
      pos[i*3+2]=(Math.random()-.5)*60;
      const gold=Math.random()>.4;
      col[i*3]=gold?1:0; col[i*3+1]=gold?.85:.9; col[i*3+2]=gold?0:1;
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:.12,vertexColors:true,transparent:true,opacity:.6});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    const icoGeo=new THREE.IcosahedronGeometry(10,1);
    const icoMat=new THREE.MeshBasicMaterial({color:0xFFD700,wireframe:true,transparent:true,opacity:.04});
    const ico=new THREE.Mesh(icoGeo,icoMat);
    scene.add(ico);

    let mx=0,my=0,scrollY=0;
    addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5);my=(e.clientY/innerHeight-.5)});

    // Listen to page scroll
    setInterval(()=>{
      const el=document.querySelector('.page-scroll');
      if(el)scrollY=el.scrollTop;
    },50);

    addEventListener('resize',()=>{
      cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });

    let t=0;
    (function frame(){
      requestAnimationFrame(frame);
      t+=.003;
      pts.rotation.y=t*.1+mx*.08;
      pts.rotation.x=t*.06+my*.05;
      ico.rotation.x=t*.15;
      ico.rotation.y=t*.2;
      // scroll zoom
      cam.position.z=35+scrollY*.012;
      cam.position.x=mx*2;
      cam.position.y=-my*2;
      renderer.render(scene,cam);
    })();
  }catch(e){console.warn(e)}
})();

/* ── Cursor ── */
(function(){
  const c=document.getElementById('cur');
  const r=document.getElementById('cur-ring');
  if(!c||!r)return;
  let rx=0,ry=0,cx=0,cy=0;
  addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;c.style.left=cx+'px';c.style.top=cy+'px'});
  (function loop(){
    rx+=(cx-rx)*.1;ry+=(cy-ry)*.1;
    r.style.left=rx+'px';r.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  document.addEventListener('mousedown',()=>c.style.transform='translate(-50%,-50%) scale(.6)');
  document.addEventListener('mouseup',()=>c.style.transform='translate(-50%,-50%) scale(1)');
})();

/* ── Card Tilt ── */
function applyTilt(el){
  el.addEventListener('mousemove',e=>{
    const r=el.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5;
    const y=(e.clientY-r.top)/r.height-.5;
    el.style.transform=`perspective(600px) rotateY(${x*10}deg) rotateX(${-y*8}deg) translateZ(4px)`;
  });
  el.addEventListener('mouseleave',()=>el.style.transform='');
}
function initTilt(){document.querySelectorAll('.tilt-card').forEach(applyTilt)}
setInterval(initTilt,1000);

/* ── Particle Burst ── */
function burst(x,y){
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*360;
    const dist=50+Math.random()*80;
    p.style.cssText=`left:${x}px;top:${y}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;background:${Math.random()>.5?'#FFD700':'#00E5FF'};box-shadow:0 0 6px currentColor`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}
window.burst=burst;

/* ── Animated Number Counter ── */
function countUp(el,target,duration=1200){
  const start=performance.now();
  const from=0;
  function update(t){
    const progress=Math.min((t-start)/duration,1);
    const ease=1-Math.pow(1-progress,4);
    el.textContent=Math.floor(from+(target-from)*ease).toLocaleString();
    if(progress<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}
window.countUp=countUp;
</script>

  firebase.initializeApp(FIREBASE_CONFIG);

function Toast({msg,icon}){ return <div className="toast"><span>{icon}</span>{msg}</div>; }

// ── AUTH PAGE ──────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',refCode:''});
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [busy,setBusy]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  async function submit(e){
    e.preventDefault(); setErr(''); setOk(''); setBusy(true);
    const email=form.email.trim().toLowerCase();
    const pass=form.password;

    if(mode==='forgot'){
      if(!email){setErr('Enter your email.');setBusy(false);return;}
      try{ await auth.sendPasswordResetEmail(email); setOk('✅ Reset email sent! Check your inbox.'); setMode('login'); }
      catch(ex){ setErr(ex.code==='auth/user-not-found'?'No account with this email.':'Failed. Try again.'); }
      setBusy(false); return;
    }

    if(!email||!pass){setErr('Fill all fields.');setBusy(false);return;}
    if(pass.length<6){setErr('Password must be 6+ characters.');setBusy(false);return;}

    try {
      if(mode==='register'){
        if(!form.name.trim()){setErr('Enter your name.');setBusy(false);return;}
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:form.name.trim()});

        // Generate unique referral code from uid
        const refCode='AE'+cred.user.uid.slice(0,6).toUpperCase();

        // Check if they used someone's referral code
        let referredBy=null;
        const enteredCode=form.refCode.trim().toUpperCase();
        if(enteredCode){
          const codeSnap=await db.collection('refCodes').doc(enteredCode).get();
          if(codeSnap.exists){ referredBy=codeSnap.data().uid; }
        }

        // Save user doc
        await db.collection('users').doc(cred.user.uid).set({
          name:form.name.trim(), email,
          score:0, refCode,
          referralCount:0, referralUnlocked:false,
          watchedByDate:{}, withdrawals:[],
          joinedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Save referral code lookup
        await db.collection('refCodes').doc(refCode).set({uid:cred.user.uid});

        // Credit referrer
        if(referredBy){
          const referrerRef=db.collection('users').doc(referredBy);
          await db.runTransaction(async t=>{
            const doc=await t.get(referrerRef);
            const cur=doc.data().referralCount||0;
            const newCount=cur+1;
            const unlocked=newCount>=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW;
            t.update(referrerRef,{
              referralCount:newCount,
              referralUnlocked:unlocked,
              score:firebase.firestore.FieldValue.increment(CONFIG.REFERRAL_BONUS_PTS)
            });
          });
          // Bonus for new user too
          await db.collection('users').doc(cred.user.uid).update({
            score:CONFIG.REFERRAL_BONUS_PTS
          });
        }

        onLogin({uid:cred.user.uid,name:form.name.trim(),email,score:referredBy?CONFIG.REFERRAL_BONUS_PTS:0,
          refCode,referralCount:0,referralUnlocked:false,watchedByDate:{},withdrawals:[]});

      } else {
        const cred=await auth.signInWithEmailAndPassword(email,pass);
        const snap=await db.collection('users').doc(cred.user.uid).get();
        const d=snap.data()||{};
        onLogin({uid:cred.user.uid,name:d.name||email.split('@')[0],email,
          score:d.score||0,refCode:d.refCode||'',
          referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
          watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
      }
    } catch(ex){
      const msgs={
        'auth/email-already-in-use':'Email already registered. Sign in instead.',
        'auth/user-not-found':'No account with this email. Register first.',
        'auth/wrong-password':'Wrong password. Try again or reset it.',
        'auth/invalid-email':'Invalid email address.',
        'auth/too-many-requests':'Too many attempts. Try again later.',
      };
      setErr(msgs[ex.code]||ex.message);
    }
    setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">A</div>
          <div className="auth-logo-text">Ad<span>Earn</span></div>
        </div>
        <h2 className="auth-title">
          {mode==='login'?'Welcome Back':mode==='register'?'Create Account':'Reset Password'}
        </h2>
        <p className="auth-sub">
          {mode==='login'?'Sign in to start earning Rupees'
          :mode==='register'?'Join and earn Rupees watching ads'
          :'Enter your email to receive a reset link'}
        </p>
        <form onSubmit={submit}>
          {err&&<div className="msg-error">⚠️ {err}</div>}
          {ok&&<div className="msg-success">{ok}</div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="Hamza Khan" value={form.name} onChange={set('name')}/>
          </div>}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} autoComplete="email"/>
          </div>
          {mode!=='forgot'&&<div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min 6 characters" value={form.password} onChange={set('password')}/>
          </div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Referral Code <span className="form-input-optional">(optional)</span></label>
            <input className="form-input" placeholder="e.g. AEABC123" value={form.refCode} onChange={set('refCode')}/>
          </div>}
          {mode==='login'&&<div className="auth-forgot">
            <button type="button" onClick={()=>{setErr('');setOk('');setMode('forgot');}}>Forgot password?</button>
          </div>}
          <button className="btn-gold" type="submit" disabled={busy}>
            {busy?'⏳ Please wait…':mode==='login'?'Sign In →':mode==='register'?'Create Account →':'Send Reset Email →'}
          </button>
          {mode==='forgot'&&<button className="btn-outline" type="button" onClick={()=>{setErr('');setOk('');setMode('login');}}>← Back to Sign In</button>}
        </form>
        {mode!=='forgot'&&<div className="auth-switch">
          {mode==='login'
            ?<>No account? <button onClick={()=>{setErr('');setOk('');setMode('register');}}>Register here</button></>
            :<>Have account? <button onClick={()=>{setErr('');setOk('');setMode('login');}}>Sign In</button></>}
        </div>}
      </div>
    </div>
  );
}

// ── AD MODAL ───────────────────────────────────────────────────────────────
function AdModal({ad,onClose,onComplete}){
  const [phase,setPhase]=useState('preview');
  const [timer,setTimer]=useState(ad.duration);
  const [progress,setProgress]=useState(0);
  useEffect(()=>{
    if(phase!=='watching')return;
    const iv=setInterval(()=>{
      setTimer(t=>{ if(t<=1){clearInterval(iv);setPhase('done');return 0;} return t-1; });
      setProgress(p=>Math.min(100,p+(100/ad.duration)));
    },1000);
    return()=>clearInterval(iv);
  },[phase]);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&phase!=='watching'&&onClose()}>
      <div className="modal-box">
        <div className="modal-handle"/>
        {phase!=='watching'&&<button className="modal-close" onClick={()=>phase!=='watching'&&onClose()}>✕</button>}
        {phase==='preview'&&<>
          <div className="modal-title">{ad.title}</div>
          <div className="modal-sub">{ad.cat} · {ad.duration}s · +{ad.reward} pts</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}}>{ad.emoji}</span>
            <span style={{fontSize:12,color:'var(--text-dim)',marginTop:6,padding:'0 16px',textAlign:'center'}}>{ad.desc}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
            <span style={{fontSize:12,color:'var(--text-dim)'}}>⏱ {ad.duration}s watch time</span>
            <span className="chip chip-gold">+{ad.reward} pts</span>
          </div>
          <button className="btn-modal" onClick={()=>setPhase('watching')}>▶ Watch Ad</button>
        </>}
        {phase==='watching'&&<>
          <div className="modal-title">Watching Ad…</div>
          <div className="modal-sub">Don't close this window</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}} className="pulse">{ad.emoji}</span>
            <div className="ad-countdown">{timer}</div>
          </div>
          <div className="prog-wrap" style={{marginBottom:10}}>
            <div className="prog-fill" style={{width:progress+'%'}}/>
          </div>
          <p style={{textAlign:'center',fontSize:13,color:'var(--text-dim)'}}>{timer}s remaining…</p>
        </>}
        {phase==='done'&&<>
          <div style={{textAlign:'center',paddingTop:4}}>
            <div style={{fontSize:48,marginBottom:8}}>🎉</div>
            <div className="modal-title">Ad Complete!</div>
            <div className="modal-sub">Points credited to your balance</div>
            <div className="modal-reward">+{ad.reward}</div>
            <div style={{fontSize:13,color:'var(--text-dim)',textAlign:'center',marginBottom:4}}>points earned</div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 16px',marginBottom:18,fontSize:13,color:'var(--text-dim)'}}>
              {`≈ Rs. ${(ad.reward/CONFIG.POINTS_PER_PKR).toFixed(1)} Rupees equivalent`}
            </div>
            <button className="btn-modal" onClick={()=>onComplete(ad)}>Claim & Next Ad →</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── WITHDRAW PAGE ──────────────────────────────────────────────────────────
function WithdrawPage({user,score,showToast,onWithdrawal}){
  const [wallet,setWallet]=useState('');
  const [amount,setAmount]=useState('');
  const bal=Math.floor(score/CONFIG.POINTS_PER_PKR);
  const unlocked=user.referralUnlocked;
  const needed=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW-user.referralCount;

  function submit(){
    if(!wallet.trim()){showToast('Enter your wallet address','⚠️');return;}
    if(!amount||parseFloat(amount)<CONFIG.MIN_WITHDRAWAL){showToast(`Min withdrawal is Rs.${CONFIG.MIN_WITHDRAWAL}`,'⚠️');return;}
    if(parseFloat(amount)>parseFloat(bal)){showToast('Insufficient balance','❌');return;}
    const r={date:fmtDate(),amount:parseFloat(amount).toFixed(2),score:Math.round(parseFloat(amount)*CONFIG.POINTS_PER_PKR),status:'pending',ts:Date.now()};
    onWithdrawal(r);
    showToast(`Withdrawal of Rs.${amount} submitted!`,'✅');
    setWallet('');setAmount('');
  }

  return(
    <div className="page-enter">
      <div className="page-header">
        <div className="page-eyebrow">Withdraw</div><h1 className="page-title">Withdraw <span>Rupees</span></h1>

            <div className="ref-gate-title">Withdrawals Locked</div>
            <div className="ref-gate-sub">
              You need to refer <strong style={{color:'var(--gold)'}}>{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW} friends</strong> before your first withdrawal.<br/>
              This ensures fair use of the platform.
            </div>
            <div className="ref-gate-prog">
              <div className="ref-gate-count">{user.referralCount}/{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW}</div>
              <div style={{flex:1}}>
                <div className="prog-wrap" style={{height:10}}>
                  <div className="prog-fill" style={{width:Math.min(100,(user.referralCount/CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW)*100)+'%'}}/>
                </div>
                <div style={{fontSize:12,color:'var(--text-dim)',marginTop:4}}>{needed} more referral{needed!==1?'s':''} to unlock</div>
              </div>
            </div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',textAlign:'left'}}>
              <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:4}}>Your referral code:</div>
              <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:18,color:'var(--gold)',letterSpacing:2}}>{user.refCode}</div>
              <div style={{fontSize:12,color:'var(--text-dim)',marginTop:4}}>Share this with friends → go to Dashboard for full sharing options</div>
            </div>
          </div>
        )}

        {/* Withdrawal form */}
        <div className="w-card" style={{opacity:unlocked?1:.5,pointerEvents:unlocked?'auto':'none'}}>
          <div className="w-hero"><div><div className="w-bal-sub">Available Balance</div><div className="w-bal">Rs. {bal}</div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:16}}>{score.toLocaleString()} pts · {CONFIG.POINTS_PER_PKR} pts = Rs.1</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label className="w-lbl">Easypaisa/JazzCash Number or Bank Account</label>

// ── ADMIN PANEL ────────────────────────────────────────────────────────────
function AdminPanel({currentUser,onBack}){
  const [tab,setTab]=useState('overview');
  const [users,setUsers]=useState([]);
  const [withdrawals,setWithdrawals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [toast,setToast]=useState(null);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  useEffect(()=>{
    if(!fbReady)return;
    setLoading(true);
    // Load all users from Firestore
    db.collection('users').get().then(snap=>{
      const list=[];
      const wdList=[];
      snap.forEach(doc=>{
        const d={id:doc.id,...doc.data()};
        list.push(d);
        // Collect all withdrawals with user info
        if(d.withdrawals&&d.withdrawals.length>0){
          d.withdrawals.forEach((w,i)=>{
            wdList.push({...w,userName:d.name,userEmail:d.email,userId:doc.id,wIndex:i});
          });
        }
      });
      list.sort((a,b)=>(b.score||0)-(a.score||0));
      wdList.sort((a,b)=>(b.ts||0)-(a.ts||0));
      setUsers(list);
      setWithdrawals(wdList);
      setLoading(false);
    }).catch(e=>{console.error(e);setLoading(false);});
  },[]);

  // Stats
  const totalUsers=users.length;
  const totalScore=users.reduce((s,u)=>s+(u.score||0),0);
  const totalPKR=Math.floor(totalScore/CONFIG.POINTS_PER_PKR);
  const pendingWDs=withdrawals.filter(w=>w.status==='pending');
  const totalPaid=withdrawals.filter(w=>w.status==='paid').reduce((s,w)=>s+parseFloat(w.amount||0),0).toFixed(2);

  // Mark withdrawal as paid
  async function markPaid(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'paid'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'paid'}:w
      ));
      showToast(`Marked $${wd.amount} as paid ✅`,'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Mark withdrawal as failed
  async function markFailed(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'failed'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'failed'}:w
      ));
      showToast(`Marked as failed`,'⚠️');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Ban/unban user (set score to 0 and flag)
  async function toggleBan(u){
    try{
      const banned=!u.banned;
      await db.collection('users').doc(u.id).update({banned});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,banned}:x));
      showToast(banned?`${u.name} banned`:`${u.name} unbanned`,banned?'🚫':'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Unlock withdrawal for a user manually
  async function unlockWithdraw(u){
    try{
      await db.collection('users').doc(u.id).update({referralUnlocked:true});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,referralUnlocked:true}:x));
      showToast(`Withdrawal unlocked for ${u.name}`,'🔓');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  const filteredUsers=users.filter(u=>
    u.name?.toLowerCase().includes(search.toLowerCase())||
    u.email?.toLowerCase().includes(search.toLowerCase())
  );

  const filteredWDs=withdrawals.filter(w=>
    tab==='pending'?w.status==='pending':true
  ).filter(w=>
    w.userName?.toLowerCase().includes(search.toLowerCase())||
    w.userEmail?.toLowerCase().includes(search.toLowerCase())
  );

  if(loading) return <Splash text="Loading admin data…"/>;

  return(
    <div className="admin-wrap">
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
      <div className="admin-topbar">
        <div>
          <div className="admin-title">⚙️ Admin <span>Panel</span></div>
          <div style={{fontSize:13,color:'var(--text-dim)',marginTop:2}}>Manage users, withdrawals and platform data</div>
        </div>
        <button className="btn-outline" style={{width:'auto',padding:'9px 20px'}} onClick={onBack}>
          ← Back to Site
        </button>
      </div>

      {/* Stats */}
      <div className="admin-stats">
        <div className="admin-stat">
          <div className="admin-stat-lbl">👥 Total Users</div>
          <div className="admin-stat-val" style={{color:'var(--cyan)'}}>{totalUsers}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⭐ Total Score</div>
          <div className="admin-stat-val" style={{color:'var(--gold)'}}>{totalScore.toLocaleString()}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⏳ Pending WDs</div>
          <div className="admin-stat-val" style={{color:'var(--red)'}}>{pendingWDs.length}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">💸 Total Paid</div>
          <div className="admin-stat-val" style={{color:'var(--green)'}}>{`Rs. ${totalPaid}`}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="admin-tabs">
        {[
          {id:'overview',label:'👥 All Users'},
          {id:'pending',label:`⏳ Pending (${pendingWDs.length})`},
          {id:'withdrawals',label:'💸 All Withdrawals'},
        ].map(t=>(
          <button key={t.id} className={`admin-tab ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);setSearch('');}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Search */}
      <input className="admin-search" placeholder="🔍 Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)}/>

      {/* USERS TABLE */}
      {tab==='overview'&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-users-hdr">
            <div>User</div><div>Email</div><div>Score</div><div>Refs</div><div>Status</div><div>Actions</div>
          </div>
          {filteredUsers.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No users found</div>}
          {filteredUsers.map(u=>(
            <div className="admin-table-row admin-users-row" key={u.id}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>{u.id.slice(0,10)}…</div>
              </div>
              <div style={{fontSize:12,color:'var(--text-dim)'}}>{u.email}</div>
              <div style={{fontFamily:'var(--font-display)',fontWeight:700,color:'var(--gold)'}}>{(u.score||0).toLocaleString()}</div>
              <div style={{textAlign:'center'}}>{u.referralCount||0}</div>
              <div>
                {u.banned
                  ?<span className="admin-badge" style={{background:'#ff4d6a20',color:'var(--red)'}}>Banned</span>
                  :u.referralUnlocked
                    ?<span className="admin-badge" style={{background:'#00d08420',color:'var(--green)'}}>Unlocked</span>
                    :<span className="admin-badge" style={{background:'#f5c84220',color:'var(--gold)'}}>Locked</span>}
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {!u.referralUnlocked&&!u.banned&&(
                  <button className="admin-btn admin-btn-green" onClick={()=>unlockWithdraw(u)}>🔓 Unlock</button>
                )}
                <button className={`admin-btn ${u.banned?'admin-btn-green':'admin-btn-red'}`} onClick={()=>toggleBan(u)}>
                  {u.banned?'✅ Unban':'🚫 Ban'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* WITHDRAWALS TABLE */}
      {(tab==='withdrawals'||tab==='pending')&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-wd-hdr">
            <div>User</div><div>Date</div><div>Score</div><div>Amount</div><div>Status</div><div>Actions</div>
          </div>
          {filteredWDs.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>
            {tab==='pending'?'No pending withdrawals 🎉':'No withdrawals yet'}
          </div>}
          {filteredWDs.map((w,i)=>(
            <div className="admin-table-row admin-wd-row" key={i}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{w.userName}</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>{w.userEmail}</div>
              </div>
              <div style={{fontSize:12,color:'var(--text-dim)'}}>{w.date}</div>
              <div style={{fontSize:12}}>{w.score?.toLocaleString()}</div>
              <div style={{fontFamily:'var(--font-display)',fontWeight:800,color:'var(--green)'}}>${w.amount}</div>
              <div>
                <span className={`admin-badge ${
                  w.status==='paid'?'badge-paid':w.status==='failed'?'badge-failed':'badge-pending'
                }`} style={{
                  background:w.status==='paid'?'#00d08420':w.status==='failed'?'#ff4d6a20':'#f5c84220',
                  color:w.status==='paid'?'var(--green)':w.status==='failed'?'var(--red)':'var(--gold)'
                }}>
                  {w.status.charAt(0).toUpperCase()+w.status.slice(1)}
                </span>
              </div>
              <div style={{display:'flex',gap:5}}>
                {w.status==='pending'&&<>
                  <button className="admin-btn admin-btn-green" onClick={()=>markPaid(w)}>✅ Paid</button>
                  <button className="admin-btn admin-btn-red" onClick={()=>markFailed(w)}>❌ Fail</button>
                </>}
                {w.status!=='pending'&&<span style={{fontSize:12,color:'var(--text-muted)'}}>Done</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Quick info */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:18,fontSize:13,color:'var(--text-dim)',lineHeight:2}}>
        <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:8}}>📋 Quick Guide</div>
        <div>✅ <strong style={{color:'var(--text)'}}>Paid</strong> — User sent money, mark after you send payment to their wallet</div>
        <div>❌ <strong style={{color:'var(--text)'}}>Fail</strong> — Wrong address or rejected, user will see failed status</div>
        <div>🔓 <strong style={{color:'var(--text)'}}>Unlock</strong> — Manually unlock withdrawal for a user without 10 referrals</div>
        <div>🚫 <strong style={{color:'var(--text)'}}>Ban</strong> — Disable a suspicious or fraudulent account</div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',  label:'Home',     icon:'🏠'},
  {id:'earn',       label:'Earn',     icon:'▶️'},
  {id:'offers',     label:'Offers',   icon:'🎯'},
  {id:'leaderboard',label:'Ranks',    icon:'🏆'},
  {id:'withdraw',   label:'Withdraw', icon:'💸'},
  {id:'profile',    label:'Profile',  icon:'👤'},
];

function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [adminMode,setAdminMode]=useState(false);
  const [score,setScore]=useState(0);
  const [watchedByDate,setWatchedByDate]=useState({});
  const [watching,setWatching]=useState(null);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!fbReady){setLoading(false);return;}
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap=await db.collection('users').doc(fbUser.uid).get();
          const d=snap.data()||{};
          // Auto-generate refCode if missing (existing accounts)
          let refCode=d.refCode||'';
          if(!refCode){
            refCode='AE'+fbUser.uid.slice(0,6).toUpperCase();
            // Save it back to Firestore
            await db.collection('users').doc(fbUser.uid).set(
              {refCode},
              {merge:true}
            );
            // Save lookup
            await db.collection('refCodes').doc(refCode).set({uid:fbUser.uid});
          }
          setUser({uid:fbUser.uid,name:d.name||fbUser.displayName||fbUser.email.split('@')[0],email:fbUser.email,
            score:d.score||0,refCode,
            referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
            watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
          setScore(d.score||0);
          setWatchedByDate(d.watchedByDate||{});
        }catch(e){console.error(e);}
      } else { setUser(null); }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  // Build today's visible ads (fresh set each day)
  const today=todayKey();
  const todayWatchedIds=(watchedByDate[today]||[]);
  // Rotate through ALL_ADS — show CONFIG.ADS in batches, cycling
  const visibleAds=CONFIG.ADS.map(ad=>({...ad,watched:todayWatchedIds.includes(ad.id)}));
  const todayWatched=visibleAds.filter(a=>a.watched);

  async function handleAdComplete(ad){
    const newWatchedIds=[...todayWatchedIds,ad.id];
    const newWatchedByDate={...watchedByDate,[today]:newWatchedIds};
    const newScore=score+ad.reward;

    // Bonus if daily goal just reached
    const justReachedGoal=newWatchedIds.length===CONFIG.DAILY_AD_GOAL&&todayWatchedIds.length<CONFIG.DAILY_AD_GOAL;
    const finalScore=justReachedGoal?newScore+CONFIG.BONUS_ON_GOAL:newScore;

    setScore(finalScore);
    setWatchedByDate(newWatchedByDate);
    setWatching(null);

    if(justReachedGoal) showToast(`Daily goal reached! +${CONFIG.BONUS_ON_GOAL} bonus pts! 🎯`,'🎯');
    else showToast(`+${ad.reward} points earned!`,'🎉');

    // Save to Firestore
    if(fbReady&&user?.uid){
      setSaving(true);
      try{ await db.collection('users').doc(user.uid).update({score:finalScore,watchedByDate:newWatchedByDate}); }
      catch(e){console.error(e);}
      setSaving(false);
    }
  }

  async function handleWithdrawal(record){
    const newWithdrawals=[...(user.withdrawals||[]),record];
    setUser(u=>({...u,withdrawals:newWithdrawals}));
    if(fbReady&&user?.uid){
      try{ await db.collection('users').doc(user.uid).update({withdrawals:newWithdrawals}); }
      catch(e){console.error(e);}
    }
  }

  async function handleSignOut(){
    if(fbReady)await auth.signOut();
    setUser(null);setScore(0);setWatchedByDate({});setPage('dashboard');
  }

  function handleLogin(u){
    setUser(u);setScore(u.score||0);setWatchedByDate(u.watchedByDate||{});
  }

  if(loading)return <Splash text="Loading your account…"/>;
  if(!user)return <AuthPage onLogin={handleLogin}/>;
  if(adminMode)return <AdminPanel currentUser={user} onBack={()=>setAdminMode(false)}/>;

  const isAdmin=user.email===CONFIG.ADMIN_EMAIL;
  const unwatched=visibleAds.filter(a=>!a.watched).length;
  const navLabel=n=>
    n.id==='earn'?'Watch & Earn':
    n.id==='offers'?'Real Offers':
    n.id==='leaderboard'?'Leaderboard':n.label;

  return(
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">A</div>
          <div className="logo-text">AD<em>EARN</em></div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-lbl">Menu</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {navLabel(n)}
              {n.id==='earn'&&unwatched>0&&<span className="nav-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="nav-badge">🔒</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="nav-item nav-admin" onClick={()=>setAdminMode(true)}>
              <span className="nav-icon">⚙️</span>Admin Panel
            </button>
          )}
        </div>
        <div className="sidebar-footer"><div className="sidebar-user">
          <div className="user-hex"><div className="user-hex-inner">{user.name.slice(0,2).toUpperCase()}</div></div>
          <div className="user-info">
            <div className="user-name">{user.name}{saving&&<span className="saving-dot"/>}</div>
            <div className="user-pts">⭐ {score.toLocaleString()} pts</div>
          </div>
          <button className="btn-logout" onClick={handleSignOut} title="Sign Out">⏻</button>
        </div></div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{navLabel(NAV.find(n=>n.id===page)||NAV[0])}</div>
          <div className="topbar-right">
            {isAdmin&&(
              <button className="btn-admin-top" onClick={()=>setAdminMode(true)}>
                ⚙️ Admin
              </button>
            )}
            <div className="topbar-balance">
              <span style={{color:'var(--green)'}}>💵</span>
              <span style={{color:'var(--cyan)',fontWeight:700}}>{`Rs. ${Math.floor(score/CONFIG.POINTS_PER_PKR)}`}</span>
            </div>
            <div className="topbar-notif">🔔<span className="notif-dot"/></div>
          </div>
        </div>

        <div className="page-scroll">
          {page==='dashboard'  &&<Dashboard    user={user} todayWatched={todayWatched} score={score} onWatchAd={setWatching} visibleAds={visibleAds}/>}
          {page==='earn'       &&<EarnPage      visibleAds={visibleAds} onWatchAd={setWatching}/>}
          {page==='offers'     &&<OfferwallPage user={user} showToast={showToast}/>}
          {page==='leaderboard'&&<LeaderboardPage score={score}/>}
          {page==='withdraw'   &&<WithdrawPage  user={user} score={score} showToast={showToast} onWithdrawal={handleWithdrawal}/>}
          {page==='profile'    &&<ProfilePage   user={user} score={score} onSignOut={handleSignOut}/>}
        </div>
      </div>

      <div className="bottom-nav">
        <div className="bn-inner">
          {NAV.map(n=>(
            <button key={n.id} className={`bn-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              {n.id==='earn'&&unwatched>0&&<span className="bn-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="bn-badge">🔒</span>}
              <span className="bn-icon">{n.icon}</span>
              <span className="bn-label">{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      {watching&&<AdModal ad={watching} onClose={()=>setWatching(null)} onComplete={handleAdComplete}/>}
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
