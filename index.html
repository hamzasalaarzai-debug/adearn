<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AdEarn — Watch Ads, Earn Rupees</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- Three.js + GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ══════════════════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#03050f;
  --deep:#070d1a;
  --surface:#0c1525;
  --glass:#ffffff08;
  --glass2:#ffffff12;
  --glass3:#ffffff1a;
  --border:#ffd70018;
  --border2:#ffd70030;
  --border3:#ffd70050;
  --gold:#ffd700;
  --gold2:#ffb300;
  --gold3:#ff8c00;
  --neon:#00ff88;
  --neon2:#00cc6a;
  --blue:#00d4ff;
  --red:#ff3366;
  --purple:#bf5fff;
  --text:#e8f0ff;
  --text2:#6b7fa8;
  --text3:#3d4e6b;
  --glow-gold:0 0 20px #ffd70040,0 0 40px #ffd70020;
  --glow-neon:0 0 20px #00ff8840,0 0 40px #00ff8820;
  --glow-blue:0 0 20px #00d4ff40,0 0 40px #00d4ff20;
}
html{scroll-behavior:smooth}
html,body,#root{height:100%;width:100%}
body{
  background:var(--void);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  cursor:none;
}
h1,h2,h3,h4{font-family:'Orbitron',sans-serif;line-height:1.2}
button{cursor:none;font-family:'Outfit',sans-serif}
input,select{font-family:'Outfit',sans-serif;cursor:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),var(--gold3));border-radius:4px}

/* ══════════════════════════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════════════════════════ */
#cursor{
  position:fixed;width:10px;height:10px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform .1s,opacity .3s;
  box-shadow:var(--glow-gold);
  mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1px solid var(--gold);border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:transform .15s ease,width .3s,height .3s,opacity .3s;
  opacity:.5;
}
body:has(button:hover) #cursor-ring{width:50px;height:50px;opacity:.8}

/* ══════════════════════════════════════════════════════
   THREE.JS CANVAS BACKGROUND
══════════════════════════════════════════════════════ */
#three-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;opacity:.7;
}

/* ══════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════ */
#root{position:relative;z-index:1}
.app-layout{display:flex;height:100vh;overflow:hidden;position:relative}

/* ══════════════════════════════════════════════════════
   GLASSMORPHISM BASE
══════════════════════════════════════════════════════ */
.glass-card{
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:20px;
  position:relative;overflow:hidden;
}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#ffd70008 0%,transparent 50%,#00ff8805 100%);
  pointer-events:none;
}
.glass-card::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.4;
}

/* ══════════════════════════════════════════════════════
   SPLASH SCREEN
══════════════════════════════════════════════════════ */
.splash{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--void);gap:20px;
  position:relative;overflow:hidden;
}
.splash-logo-3d{
  width:80px;height:80px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  border-radius:20px;display:flex;align-items:center;
  justify-content:center;font-family:'Orbitron',sans-serif;
  font-size:32px;font-weight:900;color:#000;
  box-shadow:var(--glow-gold);
  animation:float3d 3s ease-in-out infinite;
}
@keyframes float3d{
  0%,100%{transform:translateY(0) rotateX(0deg) rotateY(0deg)}
  25%{transform:translateY(-10px) rotateX(5deg) rotateY(5deg)}
  75%{transform:translateY(5px) rotateX(-3deg) rotateY(-3deg)}
}
.splash-title{
  font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.splash-ring{
  width:60px;height:60px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--gold);border-right-color:var(--neon);
  animation:spin 1s linear infinite;
  box-shadow:var(--glow-gold);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════════════════════ */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 30% 50%,#ffd70008 0%,transparent 60%),
             radial-gradient(ellipse at 70% 50%,#00ff8806 0%,transparent 60%),
             var(--void);
}
.auth-card{
  width:100%;max-width:420px;
  padding:40px 36px;
  animation:cardReveal .6s cubic-bezier(.16,1,.3,1);
}
@keyframes cardReveal{
  from{opacity:0;transform:translateY(30px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.auth-logo-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-family:'Orbitron',sans-serif;
  font-size:22px;font-weight:900;color:#000;
  box-shadow:var(--glow-gold);
  animation:float3d 4s ease-in-out infinite;
}
.auth-logo-text{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900}
.auth-logo-text span{
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,var(--text),var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{
  font-size:11px;color:var(--gold);margin-bottom:7px;display:block;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
}
.form-input{
  width:100%;
  background:linear-gradient(135deg,#ffffff06,#ffffff03);
  border:1px solid var(--border2);border-radius:12px;
  padding:13px 16px;color:var(--text);font-size:14px;outline:none;
  transition:all .3s;backdrop-filter:blur(10px);
}
.form-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px #ffd70015,var(--glow-gold);
  background:linear-gradient(135deg,#ffffff0a,#ffffff05);
}
.form-input::placeholder{color:var(--text3)}
.form-input-optional{font-size:10px;color:var(--text3);margin-left:4px;text-transform:none;letter-spacing:0}
.btn-gold{
  width:100%;margin-top:6px;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));
  color:#000;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;font-family:'Orbitron',sans-serif;
  letter-spacing:.5px;transition:all .3s;position:relative;overflow:hidden;
  box-shadow:var(--glow-gold);
}
.btn-gold::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,#ffffff30,transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-gold:hover::before{transform:translateX(100%)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px #ffd70050}
.btn-gold:active{transform:translateY(0)}
.btn-gold:disabled{opacity:.5;transform:none;cursor:not-allowed}
.btn-outline{
  width:100%;margin-top:10px;background:transparent;
  color:var(--text2);border:1px solid var(--border2);border-radius:12px;
  padding:12px;font-size:14px;font-weight:600;transition:all .3s;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--text2)}
.auth-switch button{background:none;border:none;color:var(--gold);font-weight:700;letter-spacing:.3px}
.auth-forgot{text-align:right;margin-top:-4px;margin-bottom:14px}
.auth-forgot button{background:none;border:none;color:var(--text3);font-size:12px;transition:color .2s}
.auth-forgot button:hover{color:var(--gold)}
.msg-error{
  background:linear-gradient(135deg,#ff336615,#ff336608);
  border:1px solid #ff336640;border-radius:10px;
  padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px;
}
.msg-success{
  background:linear-gradient(135deg,#00ff8815,#00ff8808);
  border:1px solid #00ff8840;border-radius:10px;
  padding:11px 14px;font-size:13px;color:var(--neon);margin-bottom:14px;
}
.msg-info{
  background:linear-gradient(135deg,#00d4ff15,#00d4ff08);
  border:1px solid #00d4ff40;border-radius:10px;
  padding:11px 14px;font-size:13px;color:var(--blue);margin-bottom:14px;
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
.sidebar{
  width:240px;min-width:240px;
  background:linear-gradient(180deg,var(--deep) 0%,var(--void) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:24px 0;
  position:relative;z-index:10;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,var(--gold),var(--neon),transparent);
  opacity:.3;
}
.sidebar-logo{
  display:flex;align-items:center;gap:12px;
  padding:0 20px 24px;border-bottom:1px solid var(--border);
}
.sidebar-logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-family:'Orbitron',sans-serif;
  font-size:16px;font-weight:900;color:#000;
  box-shadow:var(--glow-gold);flex-shrink:0;
}
.sidebar-logo-text{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900}
.sidebar-logo-text span{
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-lbl{
  font-size:9px;font-weight:700;color:var(--text3);
  letter-spacing:2.5px;text-transform:uppercase;
  padding:0 10px;margin-bottom:8px;font-family:'Orbitron',sans-serif;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:12px;
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:none;transition:all .3s;border:1px solid transparent;
  background:none;width:100%;text-align:left;
  position:relative;overflow:hidden;margin-bottom:2px;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(var(--gold),var(--neon));
  border-radius:0 2px 2px 0;transform:scaleY(0);transition:transform .3s;
}
.nav-item:hover{
  background:var(--glass);color:var(--text);
  border-color:var(--border);
}
.nav-item.active{
  background:linear-gradient(135deg,#ffd70015,#00ff8808);
  color:var(--gold);border-color:var(--border2);
}
.nav-item.active::before{transform:scaleY(1)}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-badge{
  margin-left:auto;
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  color:#fff;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  box-shadow:0 0 10px #ff336640;
}
.nav-admin{
  background:linear-gradient(135deg,#ff336610,#ff336605)!important;
  border-color:#ff336630!important;color:var(--red)!important;
}
.sidebar-user{
  padding:16px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.s-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#000;flex-shrink:0;
  box-shadow:var(--glow-gold);font-family:'Orbitron',sans-serif;
}
.s-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-pts{font-size:11px;color:var(--gold);font-family:'Orbitron',sans-serif;font-weight:600}
.s-logout{
  background:none;border:1px solid var(--border);color:var(--text3);
  cursor:none;padding:6px;border-radius:8px;font-size:16px;
  transition:all .3s;display:flex;align-items:center;justify-content:center;
}
.s-logout:hover{border-color:var(--red);color:var(--red);box-shadow:0 0 10px #ff336620}
.saving-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--neon);margin-left:6px;
  animation:pulse 1.5s infinite;box-shadow:var(--glow-neon);
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* ══════════════════════════════════════════════════════
   BOTTOM NAV (mobile)
══════════════════════════════════════════════════════ */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,transparent,var(--deep));
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border2);
  z-index:50;padding:10px 0 max(10px,env(safe-area-inset-bottom));
}
.bn-inner{display:flex;justify-content:space-around;align-items:center}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 8px;border:none;background:none;
  color:var(--text3);cursor:none;transition:all .3s;min-width:52px;position:relative;
}
.bn-item.active{color:var(--gold)}
.bn-item.active .bn-icon{filter:drop-shadow(0 0 6px var(--gold))}
.bn-icon{font-size:20px;line-height:1;transition:transform .3s}
.bn-item:active .bn-icon{transform:scale(.85)}
.bn-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'Orbitron',sans-serif}
.bn-badge{
  position:absolute;top:-2px;right:4px;
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  color:#fff;font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:10px;
  box-shadow:0 0 8px #ff336640;
}

/* ══════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════ */
.topbar{
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,var(--deep),var(--surface));
  backdrop-filter:blur(20px);flex-shrink:0;
  position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--neon),transparent);
  opacity:.3;
}
.topbar-title{
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:13px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;
}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-balance{
  background:linear-gradient(135deg,#00ff8810,#00ff8805);
  border:1px solid #00ff8830;border-radius:12px;
  padding:8px 16px;display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:700;font-family:'Orbitron',sans-serif;
  box-shadow:var(--glow-neon);letter-spacing:.5px;
}
.topbar-notif{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:none;position:relative;font-size:17px;transition:all .3s;
}
.topbar-notif:hover{border-color:var(--gold);box-shadow:var(--glow-gold)}
.notif-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  background:var(--red);border-radius:50%;
  border:2px solid var(--deep);
  box-shadow:0 0 8px var(--red);
  animation:pulse 2s infinite;
}
.btn-admin{
  background:linear-gradient(135deg,#ff336615,#ff336608);
  border:1px solid #ff336640;border-radius:12px;
  padding:8px 14px;color:var(--red);font-size:12px;
  font-weight:700;cursor:none;font-family:'Orbitron',sans-serif;
  letter-spacing:.5px;transition:all .3s;
}
.btn-admin:hover{background:#ff336625;box-shadow:0 0 15px #ff336630}

/* ══════════════════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════════════════ */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;background:transparent}
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.page-header{padding:28px 24px 0;margin-bottom:24px}
.page-title{
  font-size:28px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-title span{
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-sub{color:var(--text2);font-size:13px;margin-top:4px}
.page-body{padding:0 20px 100px}

/* ══════════════════════════════════════════════════════
   STATS GRID
══════════════════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px}
.stat-card{
  padding:20px;border-radius:20px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);
  backdrop-filter:blur(20px);position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  transform-style:preserve-3d;
}
.stat-card::before{
  content:'';position:absolute;top:-50%;right:-50%;
  width:100%;height:100%;
  background:radial-gradient(circle,var(--glow-col,#ffd70010) 0%,transparent 70%);
  pointer-events:none;transition:opacity .3s;
}
.stat-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--border3);
  box-shadow:0 20px 40px #00000060;
}
.stat-card.gold-card::before{--glow-col:#ffd70015}
.stat-card.green-card::before{--glow-col:#00ff8812}
.stat-card.blue-card::before{--glow-col:#00d4ff12}
.stat-card.purple-card::before{--glow-col:#bf5fff12}
.stat-lbl{
  font-size:10px;color:var(--text3);font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
  letter-spacing:1.5px;text-transform:uppercase;font-family:'Orbitron',sans-serif;
}
.stat-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.si-gold{background:#ffd70018;box-shadow:0 0 12px #ffd70020}
.si-green{background:#00ff8818;box-shadow:0 0 12px #00ff8820}
.si-blue{background:#00d4ff18;box-shadow:0 0 12px #00d4ff20}
.si-purple{background:#bf5fff18;box-shadow:0 0 12px #bf5fff20}
.stat-val{
  font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;
  line-height:1;letter-spacing:-1px;
}
.stat-chg{font-size:12px;margin-top:6px;color:var(--neon);font-weight:500}

/* ══════════════════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════════════════ */
.prog-wrap{
  background:#ffffff08;border-radius:100px;
  height:6px;overflow:hidden;position:relative;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--neon));
  border-radius:100px;transition:width .6s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 10px #ffd70040;
  position:relative;
}
.prog-fill::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,#ffffff50);
  border-radius:100px;
}

/* ══════════════════════════════════════════════════════
   ADS GRID
══════════════════════════════════════════════════════ */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--text),var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ads-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px}
.ad-card{
  border-radius:18px;overflow:hidden;transition:all .4s cubic-bezier(.16,1,.3,1);
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
  animation:fadeSlideUp .4s cubic-bezier(.16,1,.3,1) both;
  transform-style:preserve-3d;
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.ad-card:hover{
  border-color:var(--border3);
  transform:translateY(-6px) perspective(800px) rotateX(2deg);
  box-shadow:0 20px 40px #00000060,var(--glow-gold);
}
.ad-card.watched{opacity:.4;filter:grayscale(.5)}
.ad-thumb{
  height:100px;display:flex;align-items:center;
  justify-content:center;font-size:38px;position:relative;
  overflow:hidden;
}
.ad-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 60%,var(--void));
}
.ad-cat{
  position:absolute;top:8px;left:8px;z-index:1;
  background:#00000060;backdrop-filter:blur(10px);
  border-radius:6px;padding:2px 8px;
  font-size:9px;color:var(--text2);font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);
}
.ad-rew{
  position:absolute;top:8px;right:8px;z-index:1;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border-radius:6px;padding:2px 8px;
  font-size:11px;font-weight:800;font-family:'Orbitron',sans-serif;
  box-shadow:var(--glow-gold);
}
.ad-body{padding:14px}
.ad-title{font-weight:700;font-size:13px;margin-bottom:4px;color:var(--text)}
.ad-desc{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.ad-meta{display:flex;align-items:center;justify-content:space-between}
.ad-dur{font-size:11px;color:var(--text3);font-family:'Orbitron',sans-serif;letter-spacing:.5px}
.btn-watch{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border:none;border-radius:8px;padding:7px 14px;
  font-size:11px;font-weight:800;cursor:none;
  font-family:'Orbitron',sans-serif;letter-spacing:.5px;
  transition:all .3s;box-shadow:var(--glow-gold);
}
.btn-watch:hover{transform:scale(1.05);box-shadow:0 0 20px #ffd70060}
.btn-watched{
  background:linear-gradient(135deg,#00ff8815,#00ff8808);
  color:var(--neon);border:1px solid #00ff8840;border-radius:8px;
  padding:7px 14px;font-size:11px;font-weight:700;cursor:default;
  font-family:'Orbitron',sans-serif;letter-spacing:.5px;
}

/* ══════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;
  background:#000000b0;backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
}
.modal-box{
  border-radius:28px 28px 0 0;padding:32px 28px 44px;
  width:100%;max-width:480px;position:relative;
  background:linear-gradient(180deg,var(--surface),var(--deep));
  border:1px solid var(--border2);border-bottom:none;
  animation:modalSlide .35s cubic-bezier(.16,1,.3,1);
}
@keyframes modalSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:40px;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--neon));
  border-radius:2px;margin:0 auto 24px;
  box-shadow:var(--glow-gold);
}
.modal-close{
  position:absolute;top:24px;right:24px;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--text2);width:32px;height:32px;border-radius:10px;
  cursor:none;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-title{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  margin-bottom:4px;letter-spacing:-.5px;
}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.ad-play-area{
  border-radius:16px;height:170px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  margin-bottom:16px;position:relative;overflow:hidden;
  border:1px solid var(--border);
}
.ad-play-area::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,transparent 30%,#00000060);
}
.ad-countdown{
  font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;
  color:var(--gold);position:absolute;right:16px;bottom:12px;
  text-shadow:var(--glow-gold);z-index:1;
}
.modal-reward{
  font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin:12px 0 4px;letter-spacing:-2px;
}
.btn-modal{
  width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));
  color:#000;border:none;border-radius:14px;padding:15px;
  font-size:15px;font-weight:800;cursor:none;font-family:'Orbitron',sans-serif;
  letter-spacing:.5px;transition:all .3s;
  box-shadow:var(--glow-gold);position:relative;overflow:hidden;
}
.btn-modal::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,#ffffff30,transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-modal:hover::before{transform:translateX(100%)}
.btn-modal:hover{box-shadow:0 8px 30px #ffd70050;transform:translateY(-2px)}

/* ══════════════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════════════ */
.lb-card{
  border-radius:20px;overflow:hidden;margin-bottom:22px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.lb-hdr{
  display:grid;grid-template-columns:48px 1fr 100px 100px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  font-size:10px;color:var(--text3);font-weight:700;
  letter-spacing:2px;text-transform:uppercase;font-family:'Orbitron',sans-serif;
}
.lb-row{
  display:grid;grid-template-columns:48px 1fr 100px 100px;
  padding:14px 20px;border-bottom:1px solid var(--border);
  align-items:center;transition:background .2s;
}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--glass)}
.lb-row.me{
  background:linear-gradient(90deg,#ffd70008,transparent);
  border-left:2px solid var(--gold);
}
.lb-rank{font-family:'Orbitron',sans-serif;font-weight:900;font-size:14px}
.rank-gold{color:var(--gold);text-shadow:var(--glow-gold)}
.rank-silver{color:#c0c0c0}
.rank-bronze{color:#cd7f32}
.lb-user{display:flex;align-items:center;gap:10px}
.lb-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;font-family:'Orbitron',sans-serif;
}
.lb-name{font-size:13px;font-weight:600}
.lb-you{
  font-size:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border-radius:4px;padding:1px 6px;
  margin-left:6px;font-weight:800;font-family:'Orbitron',sans-serif;
}
.lb-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.lb-usdt{font-size:12px;color:var(--neon);font-weight:700;font-family:'Orbitron',sans-serif}

/* ══════════════════════════════════════════════════════
   WITHDRAW
══════════════════════════════════════════════════════ */
.w-card{
  border-radius:20px;padding:24px;margin-bottom:18px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.w-bal{
  font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:-2px;line-height:1;
}
.w-lbl{
  font-size:10px;color:var(--gold);margin-bottom:7px;display:block;
  font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Orbitron',sans-serif;
}
.w-input{
  width:100%;background:var(--glass);border:1px solid var(--border2);
  border-radius:12px;padding:13px 16px;color:var(--text);font-size:14px;
  outline:none;transition:all .3s;backdrop-filter:blur(10px);
}
.w-input:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px #ffd70012,var(--glow-gold);
}
.w-input::placeholder{color:var(--text3)}
.btn-green{
  width:100%;margin-top:4px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  color:#000;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:800;cursor:none;
  font-family:'Orbitron',sans-serif;letter-spacing:.5px;transition:all .3s;
  box-shadow:var(--glow-neon);
}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 30px #00ff8850}
.hist-tbl{
  border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.hist-hdr{
  display:grid;grid-template-columns:1fr 70px 80px 80px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  font-size:10px;color:var(--text3);font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;font-family:'Orbitron',sans-serif;
}
.hist-row{
  display:grid;grid-template-columns:1fr 70px 80px 80px;
  padding:14px 20px;border-bottom:1px solid var(--border);
  font-size:13px;align-items:center;transition:background .2s;
}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:var(--glass)}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;font-family:'Orbitron',sans-serif}
.badge-pending{background:#ffd70015;color:var(--gold);border:1px solid #ffd70030}
.badge-paid{background:#00ff8815;color:var(--neon);border:1px solid #00ff8830}
.badge-failed{background:#ff336615;color:var(--red);border:1px solid #ff336630}

/* ══════════════════════════════════════════════════════
   REFERRAL GATE
══════════════════════════════════════════════════════ */
.ref-gate{
  border-radius:20px;padding:28px;margin-bottom:18px;text-align:center;
  background:linear-gradient(135deg,#ffd70010,#00ff8808);
  border:1px solid var(--border2);backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.ref-gate::before{
  content:'🔒';position:absolute;right:-10px;top:-10px;
  font-size:80px;opacity:.05;transform:rotate(15deg);
}
.ref-gate-icon{font-size:48px;margin-bottom:12px;filter:drop-shadow(0 0 15px var(--gold))}
.ref-gate-title{
  font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;
  margin-bottom:8px;color:var(--gold);
}
.ref-gate-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7}
.ref-gate-prog{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.ref-gate-count{
  font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;
  color:var(--gold);white-space:nowrap;text-shadow:var(--glow-gold);
}

/* ══════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════ */
.prof-card{
  border-radius:20px;padding:28px;margin-bottom:16px;text-align:center;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.prof-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#000;
  margin:0 auto 16px;font-family:'Orbitron',sans-serif;
  box-shadow:var(--glow-gold);
  animation:float3d 4s ease-in-out infinite;
}
.prof-stats{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
  border-top:1px solid var(--border);padding-top:20px;margin-top:20px;
}
.prof-stat-val{
  font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.prof-stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.5px}
.settings-sec{
  border-radius:20px;padding:20px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.settings-sec h3{
  font-family:'Orbitron',sans-serif;font-size:13px;margin-bottom:16px;
  color:var(--gold);letter-spacing:1px;text-transform:uppercase;
}
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:14px;font-weight:500;color:var(--text)}
.set-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{
  width:44px;height:24px;background:var(--glass2);
  border-radius:12px;position:relative;cursor:none;
  border:1px solid var(--border2);transition:all .3s;flex-shrink:0;
}
.toggle.on{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  border-color:var(--neon);box-shadow:var(--glow-neon);
}
.toggle::after{
  content:'';position:absolute;width:18px;height:18px;
  background:#fff;border-radius:50%;top:2px;left:2px;
  transition:left .3s cubic-bezier(.16,1,.3,1);
  box-shadow:0 2px 6px #00000040;
}
.toggle.on::after{left:22px}

/* ══════════════════════════════════════════════════════
   CHIPS & MISC
══════════════════════════════════════════════════════ */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--glass2);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text2);
  font-weight:600;letter-spacing:.3px;
}
.chip-gold{
  background:linear-gradient(135deg,#ffd70015,#ffd70008);
  border-color:#ffd70030;color:var(--gold);
}
.chip-green{
  background:linear-gradient(135deg,#00ff8815,#00ff8808);
  border-color:#00ff8830;color:var(--neon);
}
.ref-box{
  background:var(--glass);border:1px dashed var(--border2);
  border-radius:14px;padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;transition:border-color .3s;
}
.ref-box:hover{border-color:var(--gold)}
.ref-code{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.btn-copy{
  background:var(--glass2);border:1px solid var(--border2);
  border-radius:10px;padding:8px 14px;color:var(--text2);
  font-size:12px;cursor:none;transition:all .3s;font-weight:600;
}
.btn-copy:hover{border-color:var(--gold);color:var(--gold);box-shadow:var(--glow-gold)}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--surface),var(--deep));
  border:1px solid var(--border2);border-radius:14px;
  padding:13px 20px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:10px;z-index:9999;
  white-space:nowrap;
  box-shadow:0 20px 40px #00000080,var(--glow-gold);
  animation:toastPop .4s cubic-bezier(.16,1,.3,1);
}
@keyframes toastPop{
  from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.9)}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}

/* ══════════════════════════════════════════════════════
   SCROLL REVEAL ANIMATION
══════════════════════════════════════════════════════ */
.reveal{
  opacity:0;transform:translateY(30px) scale(.97);
  transition:opacity .6s cubic-bezier(.16,1,.3,1),
             transform .6s cubic-bezier(.16,1,.3,1);
}
.reveal.visible{opacity:1;transform:translateY(0) scale(1)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}

/* ══════════════════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════════════════ */
.admin-wrap{min-height:100vh;padding:24px;background:transparent}
.admin-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:14px;
}
.admin-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900}
.admin-title span{
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.admin-stat{
  border-radius:18px;padding:20px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.admin-stat-lbl{font-size:11px;color:var(--text3);margin-bottom:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif}
.admin-stat-val{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900}
.admin-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.admin-tab{
  padding:9px 20px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--glass);color:var(--text2);
  font-size:12px;font-weight:700;cursor:none;transition:all .3s;
  font-family:'Orbitron',sans-serif;letter-spacing:.5px;
}
.admin-tab.active{
  background:linear-gradient(135deg,#ff336620,#ff336610);
  border-color:#ff336650;color:var(--red);
  box-shadow:0 0 15px #ff336620;
}
.admin-table{
  border-radius:18px;overflow:hidden;margin-bottom:20px;
  background:linear-gradient(135deg,var(--glass2),var(--glass));
  border:1px solid var(--border);backdrop-filter:blur(20px);
}
.admin-table-hdr{
  padding:12px 20px;border-bottom:1px solid var(--border);
  font-size:10px;color:var(--text3);font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;display:grid;
  font-family:'Orbitron',sans-serif;
}
.admin-table-row{
  padding:14px 20px;border-bottom:1px solid var(--border);
  align-items:center;display:grid;font-size:13px;transition:background .2s;
}
.admin-table-row:last-child{border-bottom:none}
.admin-table-row:hover{background:var(--glass)}
.admin-users-hdr{grid-template-columns:1fr 140px 80px 80px 80px 110px}

<!-- Custom Cursor -->

<div id="cursor-ring"></div>

<!-- Three.js Background -->
<canvas id="three-canvas"></canvas>

<div id="root"></div>

<!-- Three.js Scene Init -->
<script>
(function(){
  try{
    const canvas=document.getElementById('three-canvas');
    const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(window.innerWidth,window.innerHeight);

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,1000);
    camera.position.z=30;

    // Particles
    const count=800;
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(count*3);
    const colors=new Float32Array(count*3);
    for(let i=0;i<count;i++){
      pos[i*3]=(Math.random()-.5)*80;
      pos[i*3+1]=(Math.random()-.5)*80;
      pos[i*3+2]=(Math.random()-.5)*80;
      const t=Math.random();
      if(t<.5){colors[i*3]=1;colors[i*3+1]=.84;colors[i*3+2]=0;}
      else{colors[i*3]=0;colors[i*3+1]=1;colors[i*3+2]=.53;}
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
    const mat=new THREE.PointsMaterial({size:.15,vertexColors:true,transparent:true,opacity:.7});
    const particles=new THREE.Points(geo,mat);
    scene.add(particles);

    // Wireframe Icosahedron
    const icoGeo=new THREE.IcosahedronGeometry(8,1);
    const icoMat=new THREE.MeshBasicMaterial({color:0xffd700,wireframe:true,transparent:true,opacity:.06});
    const ico=new THREE.Mesh(icoGeo,icoMat);
    scene.add(ico);

    // Torus
    const torusGeo=new THREE.TorusGeometry(12,0.5,8,60);
    const torusMat=new THREE.MeshBasicMaterial({color:0x00ff88,wireframe:true,transparent:true,opacity:.04});
    const torus=new THREE.Mesh(torusGeo,torusMat);
    torus.rotation.x=Math.PI/4;
    scene.add(torus);

    let scrollY=0;
    window.addEventListener('scroll',()=>scrollY=window.scrollY,{passive:true});
    document.addEventListener('scroll',e=>{
      const el=document.querySelector('.page-scroll');
      if(el)scrollY=el.scrollTop;
    },{passive:true});

    let mouseX=0,mouseY=0;
    window.addEventListener('mousemove',e=>{
      mouseX=(e.clientX/window.innerWidth-.5)*2;
      mouseY=(e.clientY/window.innerHeight-.5)*2;
    });

    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    });

    let t=0;
    function animate(){
      requestAnimationFrame(animate);
      t+=.003;
      particles.rotation.y=t*.15+mouseX*.1;
      particles.rotation.x=t*.08+mouseY*.05;
      ico.rotation.x=t*.2;
      ico.rotation.y=t*.3;
      ico.rotation.z=t*.1;
      torus.rotation.z=t*.1;
      torus.rotation.y=t*.15;
      // Scroll zoom
      camera.position.z=30+scrollY*.015;
      renderer.render(scene,camera);
    }
    animate();
  }catch(e){console.warn('Three.js:',e)}
})();

// Custom cursor
(function(){
  const c=document.getElementById('cursor');
  const r=document.getElementById('cursor-ring');
  if(!c||!r)return;
  let rx=0,ry=0,cx=0,cy=0;
  window.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;c.style.left=cx+'px';c.style.top=cy+'px';});
  function loop(){
    rx+=(cx-rx)*.12;ry+=(cy-ry)*.12;
    r.style.left=rx+'px';r.style.top=ry+'px';
    requestAnimationFrame(loop);
  }
  loop();
})();

// GSAP ScrollTrigger setup
if(typeof gsap!=='undefined'&&typeof ScrollTrigger!=='undefined'){
  gsap.registerPlugin(ScrollTrigger);
}

// Scroll reveal observer
function initReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible');}
    });
  },{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}
setTimeout(initReveal,500);
setInterval(initReveal,2000);
</script>

<script type="text/babel">

const {useState,useEffect,useRef} = React;

// ── Firebase init ──────────────────────────────────────────────────────────
let auth=null, db=null, fbReady=false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth=firebase.auth(); db=firebase.firestore(); fbReady=true;
} catch(e){ console.warn('Firebase:',e); }

// ── Helpers ────────────────────────────────────────────────────────────────
const fmtDate = ()=>new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
const todayKey = ()=>new Date().toISOString().slice(0,10); // "2025-05-21"

function Toast({msg,icon}){ return <div className="toast"><span>{icon}</span>{msg}</div>; }
function Splash({text}){ return(
  <div className="splash">
    <div className="splash-logo-3d">A</div>
    <div className="splash-title">AdEarn</div>
    <div className="splash-ring"/>
    {text&&<div style={{fontSize:12,color:'var(--text2)',marginTop:8,fontFamily:"Orbitron",letterSpacing:"1px"}}>{text}</div>}
  </div>
);}

// ── AUTH PAGE ──────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',refCode:''});
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [busy,setBusy]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  async function submit(e){
    e.preventDefault(); setErr(''); setOk(''); setBusy(true);
    const email=form.email.trim().toLowerCase();
    const pass=form.password;

    if(mode==='forgot'){
      if(!email){setErr('Enter your email.');setBusy(false);return;}
      try{ await auth.sendPasswordResetEmail(email); setOk('✅ Reset email sent! Check your inbox.'); setMode('login'); }
      catch(ex){ setErr(ex.code==='auth/user-not-found'?'No account with this email.':'Failed. Try again.'); }
      setBusy(false); return;
    }

    if(!email||!pass){setErr('Fill all fields.');setBusy(false);return;}
    if(pass.length<6){setErr('Password must be 6+ characters.');setBusy(false);return;}

    try {
      if(mode==='register'){
        if(!form.name.trim()){setErr('Enter your name.');setBusy(false);return;}
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:form.name.trim()});

        // Generate unique referral code from uid
        const refCode='AE'+cred.user.uid.slice(0,6).toUpperCase();

        // Check if they used someone's referral code
        let referredBy=null;
        const enteredCode=form.refCode.trim().toUpperCase();
        if(enteredCode){
          const codeSnap=await db.collection('refCodes').doc(enteredCode).get();
          if(codeSnap.exists){ referredBy=codeSnap.data().uid; }
        }

        // Save user doc
        await db.collection('users').doc(cred.user.uid).set({
          name:form.name.trim(), email,
          score:0, refCode,
          referralCount:0, referralUnlocked:false,
          watchedByDate:{}, withdrawals:[],
          joinedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Save referral code lookup
        await db.collection('refCodes').doc(refCode).set({uid:cred.user.uid});

        // Credit referrer
        if(referredBy){
          const referrerRef=db.collection('users').doc(referredBy);
          await db.runTransaction(async t=>{
            const doc=await t.get(referrerRef);
            const cur=doc.data().referralCount||0;
            const newCount=cur+1;
            const unlocked=newCount>=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW;
            t.update(referrerRef,{
              referralCount:newCount,
              referralUnlocked:unlocked,
              score:firebase.firestore.FieldValue.increment(CONFIG.REFERRAL_BONUS_PTS)
            });
          });
          // Bonus for new user too
          await db.collection('users').doc(cred.user.uid).update({
            score:CONFIG.REFERRAL_BONUS_PTS
          });
        }

        onLogin({uid:cred.user.uid,name:form.name.trim(),email,score:referredBy?CONFIG.REFERRAL_BONUS_PTS:0,
          refCode,referralCount:0,referralUnlocked:false,watchedByDate:{},withdrawals:[]});

      } else {
        const cred=await auth.signInWithEmailAndPassword(email,pass);
        const snap=await db.collection('users').doc(cred.user.uid).get();
        const d=snap.data()||{};
        onLogin({uid:cred.user.uid,name:d.name||email.split('@')[0],email,
          score:d.score||0,refCode:d.refCode||'',
          referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
          watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
      }
    } catch(ex){
      const msgs={
        'auth/email-already-in-use':'Email already registered. Sign in instead.',
        'auth/user-not-found':'No account with this email. Register first.',
        'auth/wrong-password':'Wrong password. Try again or reset it.',
        'auth/invalid-email':'Invalid email address.',
        'auth/too-many-requests':'Too many attempts. Try again later.',
      };
      setErr(msgs[ex.code]||ex.message);
    }
    setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">A</div>
          <div className="auth-logo-text">Ad<span>Earn</span></div>
        </div>
        <h2 className="auth-title">
          {mode==='login'?'Welcome Back':mode==='register'?'Create Account':'Reset Password'}
        </h2>
        <p className="auth-sub">
          {mode==='login'?'Sign in to start earning Rupees'
          :mode==='register'?'Join and earn Rupees watching ads'
          :'Enter your email to receive a reset link'}
        </p>
        <form onSubmit={submit}>
          {err&&<div className="msg-error">⚠️ {err}</div>}
          {ok&&<div className="msg-success">{ok}</div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="Hamza Khan" value={form.name} onChange={set('name')}/>
          </div>}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} autoComplete="email"/>
          </div>
          {mode!=='forgot'&&<div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min 6 characters" value={form.password} onChange={set('password')}/>
          </div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Referral Code <span className="form-input-optional">(optional)</span></label>
            <input className="form-input" placeholder="e.g. AEABC123" value={form.refCode} onChange={set('refCode')}/>
          </div>}
          {mode==='login'&&<div className="auth-forgot">
            <button type="button" onClick={()=>{setErr('');setOk('');setMode('forgot');}}>Forgot password?</button>
          </div>}
          <button className="btn-gold" type="submit" disabled={busy}>
            {busy?'⏳ Please wait…':mode==='login'?'Sign In →':mode==='register'?'Create Account →':'Send Reset Email →'}
          </button>
          {mode==='forgot'&&<button className="btn-outline" type="button" onClick={()=>{setErr('');setOk('');setMode('login');}}>← Back to Sign In</button>}
        </form>
        {mode!=='forgot'&&<div className="auth-switch">
          {mode==='login'
            ?<>No account? <button onClick={()=>{setErr('');setOk('');setMode('register');}}>Register here</button></>
            :<>Have account? <button onClick={()=>{setErr('');setOk('');setMode('login');}}>Sign In</button></>}
        </div>}
      </div>
    </div>
  );
}

  const [timer,setTimer]=useState(ad.duration);

    },1000);

  return(

            <span className="chip chip-gold">+{ad.reward} pts</span>
          </div>
          <button className="btn-modal" onClick={()=>setPhase('watching')}>▶ Watch Ad</button>
        </>}
        {phase==='watching'&&<>
          <div className="modal-title">Watching Ad…</div>
          <div className="modal-sub">Don't close this window</div>

function WithdrawPage({user,score,showToast,onWithdrawal}){
  const [wallet,setWallet]=useState('');
  const [amount,setAmount]=useState('');
  const bal=Math.floor(score/CONFIG.POINTS_PER_PKR);
  const unlocked=user.referralUnlocked;
  const needed=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW-user.referralCount;

  function submit(){
    if(!wallet.trim()){showToast('Enter your wallet address','⚠️');return;}
    if(!amount||parseFloat(amount)<CONFIG.MIN_WITHDRAWAL){showToast(`Min withdrawal is Rs.${CONFIG.MIN_WITHDRAWAL}`,'⚠️');return;}
    if(parseFloat(amount)>parseFloat(bal)){showToast('Insufficient balance','❌');return;}
    const r={date:fmtDate(),amount:parseFloat(amount).toFixed(2),score:Math.round(parseFloat(amount)*CONFIG.POINTS_PER_PKR),status:'pending',ts:Date.now()};
    onWithdrawal(r);
    showToast(`Withdrawal of Rs.${amount} submitted!`,'✅');
    setWallet('');setAmount('');
  }

  return(
    <div>
      <div className="page-header">
        <h1 className="page-title">Withdraw <span>Rupees</span></h1>
        <p className="page-sub">Min Rs.200 · Easypaisa / JazzCash / Bank</p>

              You need to refer <strong style={{color:'var(--gold)'}}>{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW} friends</strong> before your first withdrawal.<br/>
              This ensures fair use of the platform.
            </div>
            <div className="ref-gate-prog">
              <div className="ref-gate-count">{user.referralCount}/{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW}</div>
              <div style={{flex:1}}>
                <div className="prog-wrap" style={{height:10}}>
                  <div className="prog-fill" style={{width:Math.min(100,(user.referralCount/CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW)*100)+'%'}}/>
                </div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{needed} more referral{needed!==1?'s':''} to unlock</div>
              </div>
            </div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',textAlign:'left'}}>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Your referral code:</div>

          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Available Balance</div>

          <div style={{fontSize:12,color:'var(--text2)',marginBottom:16}}>{score.toLocaleString()} pts · {CONFIG.POINTS_PER_PKR} pts = Rs.1</div>

// ── ADMIN PANEL ────────────────────────────────────────────────────────────
function AdminPanel({currentUser,onBack}){
  const [tab,setTab]=useState('overview');
  const [users,setUsers]=useState([]);
  const [withdrawals,setWithdrawals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [toast,setToast]=useState(null);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  useEffect(()=>{
    if(!fbReady)return;
    setLoading(true);
    // Load all users from Firestore
    db.collection('users').get().then(snap=>{
      const list=[];
      const wdList=[];
      snap.forEach(doc=>{
        const d={id:doc.id,...doc.data()};
        list.push(d);
        // Collect all withdrawals with user info
        if(d.withdrawals&&d.withdrawals.length>0){
          d.withdrawals.forEach((w,i)=>{
            wdList.push({...w,userName:d.name,userEmail:d.email,userId:doc.id,wIndex:i});
          });
        }
      });
      list.sort((a,b)=>(b.score||0)-(a.score||0));
      wdList.sort((a,b)=>(b.ts||0)-(a.ts||0));
      setUsers(list);
      setWithdrawals(wdList);
      setLoading(false);
    }).catch(e=>{console.error(e);setLoading(false);});
  },[]);

  // Stats
  const totalUsers=users.length;
  const totalScore=users.reduce((s,u)=>s+(u.score||0),0);
  const totalPKR=Math.floor(totalScore/CONFIG.POINTS_PER_PKR);
  const pendingWDs=withdrawals.filter(w=>w.status==='pending');
  const totalPaid=withdrawals.filter(w=>w.status==='paid').reduce((s,w)=>s+parseFloat(w.amount||0),0).toFixed(2);

  // Mark withdrawal as paid
  async function markPaid(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'paid'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'paid'}:w
      ));
      showToast(`Marked $${wd.amount} as paid ✅`,'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Mark withdrawal as failed
  async function markFailed(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'failed'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'failed'}:w
      ));
      showToast(`Marked as failed`,'⚠️');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Ban/unban user (set score to 0 and flag)
  async function toggleBan(u){
    try{
      const banned=!u.banned;
      await db.collection('users').doc(u.id).update({banned});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,banned}:x));
      showToast(banned?`${u.name} banned`:`${u.name} unbanned`,banned?'🚫':'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Unlock withdrawal for a user manually
  async function unlockWithdraw(u){
    try{
      await db.collection('users').doc(u.id).update({referralUnlocked:true});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,referralUnlocked:true}:x));
      showToast(`Withdrawal unlocked for ${u.name}`,'🔓');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  const filteredUsers=users.filter(u=>
    u.name?.toLowerCase().includes(search.toLowerCase())||
    u.email?.toLowerCase().includes(search.toLowerCase())
  );

  const filteredWDs=withdrawals.filter(w=>
    tab==='pending'?w.status==='pending':true
  ).filter(w=>
    w.userName?.toLowerCase().includes(search.toLowerCase())||
    w.userEmail?.toLowerCase().includes(search.toLowerCase())
  );

  if(loading) return <Splash text="Loading admin data…"/>;

  return(
    <div className="admin-wrap">
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
      <div className="admin-topbar">
        <div>
          <div className="admin-title">⚙️ Admin <span>Panel</span></div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>Manage users, withdrawals and platform data</div>
        </div>
        <button onClick={onBack} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'9px 18px',color:'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          ← Back to Site
        </button>
      </div>

      {/* Stats */}
      <div className="admin-stats">
        <div className="admin-stat">
          <div className="admin-stat-lbl">👥 Total Users</div>
          <div className="admin-stat-val" style={{color:'var(--blue)'}}>{totalUsers}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⭐ Total Score</div>
          <div className="admin-stat-val" style={{color:'var(--gold)'}}>{totalScore.toLocaleString()}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⏳ Pending WDs</div>
          <div className="admin-stat-val" style={{color:'var(--red)'}}>{pendingWDs.length}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">💸 Total Paid</div>
          <div className="admin-stat-val" style={{color:'var(--green)'}}>{`Rs. ${totalPaid}`}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="admin-tabs">
        {[
          {id:'overview',label:'👥 All Users'},
          {id:'pending',label:`⏳ Pending (${pendingWDs.length})`},
          {id:'withdrawals',label:'💸 All Withdrawals'},
        ].map(t=>(
          <button key={t.id} className={`admin-tab ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);setSearch('');}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Search */}
      <input className="admin-search" placeholder="🔍 Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)}/>

      {/* USERS TABLE */}
      {tab==='overview'&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-users-hdr">
            <div>User</div><div>Email</div><div>Score</div><div>Refs</div><div>Status</div><div>Actions</div>
          </div>
          {filteredUsers.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>No users found</div>}
          {filteredUsers.map(u=>(
            <div className="admin-table-row admin-users-row" key={u.id}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{u.id.slice(0,10)}…</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{u.email}</div>
              <div style={{fontFamily:'Syne',fontWeight:700,color:'var(--gold)'}}>{(u.score||0).toLocaleString()}</div>
              <div style={{textAlign:'center'}}>{u.referralCount||0}</div>
              <div>
                {u.banned
                  ?<span className="admin-badge" style={{background:'#ff4d6a20',color:'var(--red)'}}>Banned</span>
                  :u.referralUnlocked
                    ?<span className="admin-badge" style={{background:'#00d08420',color:'var(--green)'}}>Unlocked</span>
                    :<span className="admin-badge" style={{background:'#f5c84220',color:'var(--gold)'}}>Locked</span>}
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {!u.referralUnlocked&&!u.banned&&(
                  <button className="admin-btn admin-btn-green" onClick={()=>unlockWithdraw(u)}>🔓 Unlock</button>
                )}
                <button className={`admin-btn ${u.banned?'admin-btn-green':'admin-btn-red'}`} onClick={()=>toggleBan(u)}>
                  {u.banned?'✅ Unban':'🚫 Ban'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* WITHDRAWALS TABLE */}
      {(tab==='withdrawals'||tab==='pending')&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-wd-hdr">
            <div>User</div><div>Date</div><div>Score</div><div>Amount</div><div>Status</div><div>Actions</div>
          </div>
          {filteredWDs.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>
            {tab==='pending'?'No pending withdrawals 🎉':'No withdrawals yet'}
          </div>}
          {filteredWDs.map((w,i)=>(
            <div className="admin-table-row admin-wd-row" key={i}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{w.userName}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{w.userEmail}</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{w.date}</div>
              <div style={{fontSize:12}}>{w.score?.toLocaleString()}</div>
              <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--green)'}}>${w.amount}</div>
              <div>
                <span className={`admin-badge ${
                  w.status==='paid'?'badge-paid':w.status==='failed'?'badge-failed':'badge-pending'
                }`} style={{
                  background:w.status==='paid'?'#00d08420':w.status==='failed'?'#ff4d6a20':'#f5c84220',
                  color:w.status==='paid'?'var(--green)':w.status==='failed'?'var(--red)':'var(--gold)'
                }}>
                  {w.status.charAt(0).toUpperCase()+w.status.slice(1)}
                </span>
              </div>
              <div style={{display:'flex',gap:5}}>
                {w.status==='pending'&&<>
                  <button className="admin-btn admin-btn-green" onClick={()=>markPaid(w)}>✅ Paid</button>
                  <button className="admin-btn admin-btn-red" onClick={()=>markFailed(w)}>❌ Fail</button>
                </>}
                {w.status!=='pending'&&<span style={{fontSize:12,color:'var(--text3)'}}>Done</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Quick info */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:18,fontSize:13,color:'var(--text2)',lineHeight:2}}>
        <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:8}}>📋 Quick Guide</div>
        <div>✅ <strong style={{color:'var(--text)'}}>Paid</strong> — User sent money, mark after you send payment to their wallet</div>
        <div>❌ <strong style={{color:'var(--text)'}}>Fail</strong> — Wrong address or rejected, user will see failed status</div>
        <div>🔓 <strong style={{color:'var(--text)'}}>Unlock</strong> — Manually unlock withdrawal for a user without 10 referrals</div>
        <div>🚫 <strong style={{color:'var(--text)'}}>Ban</strong> — Disable a suspicious or fraudulent account</div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',  label:'Home',     icon:'🏠'},
  {id:'earn',       label:'Earn',     icon:'▶️'},
  {id:'offers',     label:'Offers',   icon:'🎯'},
  {id:'leaderboard',label:'Ranks',    icon:'🏆'},
  {id:'withdraw',   label:'Withdraw', icon:'💸'},
  {id:'profile',    label:'Profile',  icon:'👤'},
];

function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [adminMode,setAdminMode]=useState(false);
  const [score,setScore]=useState(0);
  const [watchedByDate,setWatchedByDate]=useState({});
  const [watching,setWatching]=useState(null);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!fbReady){setLoading(false);return;}
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap=await db.collection('users').doc(fbUser.uid).get();
          const d=snap.data()||{};
          // Auto-generate refCode if missing (existing accounts)
          let refCode=d.refCode||'';
          if(!refCode){
            refCode='AE'+fbUser.uid.slice(0,6).toUpperCase();
            // Save it back to Firestore
            await db.collection('users').doc(fbUser.uid).set(
              {refCode},
              {merge:true}
            );
            // Save lookup
            await db.collection('refCodes').doc(refCode).set({uid:fbUser.uid});
          }
          setUser({uid:fbUser.uid,name:d.name||fbUser.displayName||fbUser.email.split('@')[0],email:fbUser.email,
            score:d.score||0,refCode,
            referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
            watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
          setScore(d.score||0);
          setWatchedByDate(d.watchedByDate||{});
        }catch(e){console.error(e);}
      } else { setUser(null); }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  // Build today's visible ads (fresh set each day)
  const today=todayKey();
  const todayWatchedIds=(watchedByDate[today]||[]);
  // Rotate through ALL_ADS — show CONFIG.ADS in batches, cycling
  const visibleAds=CONFIG.ADS.map(ad=>({...ad,watched:todayWatchedIds.includes(ad.id)}));
  const todayWatched=visibleAds.filter(a=>a.watched);

  async function handleAdComplete(ad){
    const newWatchedIds=[...todayWatchedIds,ad.id];
    const newWatchedByDate={...watchedByDate,[today]:newWatchedIds};
    const newScore=score+ad.reward;

    // Bonus if daily goal just reached
    const justReachedGoal=newWatchedIds.length===CONFIG.DAILY_AD_GOAL&&todayWatchedIds.length<CONFIG.DAILY_AD_GOAL;
    const finalScore=justReachedGoal?newScore+CONFIG.BONUS_ON_GOAL:newScore;

    setScore(finalScore);
    setWatchedByDate(newWatchedByDate);
    setWatching(null);

    if(justReachedGoal) showToast(`Daily goal reached! +${CONFIG.BONUS_ON_GOAL} bonus pts! 🎯`,'🎯');
    else showToast(`+${ad.reward} points earned!`,'🎉');

    // Save to Firestore
    if(fbReady&&user?.uid){
      setSaving(true);
      try{ await db.collection('users').doc(user.uid).update({score:finalScore,watchedByDate:newWatchedByDate}); }
      catch(e){console.error(e);}
      setSaving(false);
    }
  }

  async function handleWithdrawal(record){
    const newWithdrawals=[...(user.withdrawals||[]),record];
    setUser(u=>({...u,withdrawals:newWithdrawals}));
    if(fbReady&&user?.uid){
      try{ await db.collection('users').doc(user.uid).update({withdrawals:newWithdrawals}); }
      catch(e){console.error(e);}
    }
  }

  async function handleSignOut(){
    if(fbReady)await auth.signOut();
    setUser(null);setScore(0);setWatchedByDate({});setPage('dashboard');
  }

  function handleLogin(u){
    setUser(u);setScore(u.score||0);setWatchedByDate(u.watchedByDate||{});
  }

  if(loading)return <Splash text="Loading your account…"/>;
  if(!user)return <AuthPage onLogin={handleLogin}/>;
  if(adminMode)return <AdminPanel currentUser={user} onBack={()=>setAdminMode(false)}/>;

  const isAdmin=user.email===CONFIG.ADMIN_EMAIL;
  const unwatched=visibleAds.filter(a=>!a.watched).length;
  const navLabel=n=>
    n.id==='earn'?'Watch & Earn':
    n.id==='offers'?'Real Offers':
    n.id==='leaderboard'?'Leaderboard':n.label;

  return(
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">A</div>
          <div className="sidebar-logo-text">Ad<span>Earn</span></div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-lbl">Menu</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {navLabel(n)}
              {n.id==='earn'&&unwatched>0&&<span className="nav-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="nav-badge">🔒</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="nav-item" onClick={()=>setAdminMode(true)}
              style={{marginTop:8,background:'#ff4d6a15',color:'var(--red)',border:'1px solid #ff4d6a30'}}>
              <span className="nav-icon">⚙️</span>Admin Panel
            </button>
          )}
        </div>
        <div className="sidebar-user">
          <div className="s-avatar">{user.name.slice(0,2).toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="s-name">{user.name}{saving&&<span className="saving-dot"/>}</div>
            <div className="s-pts">⭐ {score.toLocaleString()} pts</div>
          </div>
          <button className="s-logout" onClick={handleSignOut} title="Sign Out">⏻</button>
        </div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{navLabel(NAV.find(n=>n.id===page)||NAV[0])}</div>
          <div className="topbar-right">
            {isAdmin&&(
              <button onClick={()=>setAdminMode(true)}
                style={{background:'#ff4d6a20',border:'1px solid #ff4d6a40',borderRadius:10,padding:'7px 12px',color:'var(--red)',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ⚙️ Admin
              </button>
            )}
            <div className="topbar-balance">
              <span style={{color:'var(--green)'}}>💵</span>
              <span style={{color:'var(--green)',fontWeight:700}}>{`Rs. ${Math.floor(score/CONFIG.POINTS_PER_PKR)}`}</span>
            </div>
            <div className="topbar-notif">🔔<span className="notif-dot"/></div>
          </div>
        </div>

        <div className="page-scroll">
          {page==='dashboard'  &&<Dashboard    user={user} todayWatched={todayWatched} score={score} onWatchAd={setWatching} visibleAds={visibleAds}/>}
          {page==='earn'       &&<EarnPage      visibleAds={visibleAds} onWatchAd={setWatching}/>}
          {page==='offers'     &&<OfferwallPage user={user} showToast={showToast}/>}
          {page==='leaderboard'&&<LeaderboardPage score={score}/>}
          {page==='withdraw'   &&<WithdrawPage  user={user} score={score} showToast={showToast} onWithdrawal={handleWithdrawal}/>}
          {page==='profile'    &&<ProfilePage   user={user} score={score} onSignOut={handleSignOut}/>}
        </div>
      </div>

      <div className="bottom-nav">
        <div className="bn-inner">
          {NAV.map(n=>(
            <button key={n.id} className={`bn-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              {n.id==='earn'&&unwatched>0&&<span className="bn-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="bn-badge">🔒</span>}
              <span className="bn-icon">{n.icon}</span>
              <span className="bn-label">{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      {watching&&<AdModal ad={watching} onClose={()=>setWatching(null)} onComplete={handleAdComplete}/>}
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
