<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>AdEarn — Elite Earning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ─── RESET ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03020a;
  --bg2:#07051a;
  --bg3:#0e0c1f;
  --card:#11102a;
  --card2:#181630;
  --border:#ffffff08;
  --border2:#ffffff12;
  --border3:#ffd70030;
  --text:#f0eeff;
  --text2:#6b6585;
  --text3:#3a3555;
  --gold:#FFD700;
  --gold2:#FF8C00;
  --green:#00FF94;
  --green2:#00CC76;
  --blue:#00E5FF;
  --red:#FF2D55;
  --purple:#9D4EDD;
  --glow-gold:0 0 30px rgba(255,215,0,0.2),0 0 60px rgba(255,215,0,0.08);
  --glow-green:0 0 30px rgba(0,255,148,0.15);
  --glow-blue:0 0 30px rgba(0,229,255,0.15);
}
html,body,#root{height:100%;width:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;cursor:none;
}
button{cursor:none;font-family:'Space Grotesk',sans-serif}
input,select{font-family:'Space Grotesk',sans-serif;cursor:none}
h1,h2,h3{font-family:'Bebas Neue',sans-serif;line-height:1.1}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),var(--blue));border-radius:3px}

/* ─── GRAIN OVERLAY ─────────────────────────── */
body::before{
  content:'';position:fixed;inset:-100px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9000;opacity:.5;
  animation:grain .4s steps(3) infinite;
}
@keyframes grain{
  0%{transform:translate(0,0)}25%{transform:translate(-2px,2px)}
  50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,1px)}100%{transform:translate(1px,-1px)}
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:8999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);
}

/* ─── AURORA ─────────────────────────────────── */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);animation:aFloat 15s ease-in-out infinite}
.ab1{width:700px;height:500px;background:radial-gradient(#FFD70020,transparent 70%);top:-10%;left:-15%;animation-delay:0s}
.ab2{width:600px;height:600px;background:radial-gradient(#00E5FF15,transparent 70%);top:30%;right:-20%;animation-delay:-5s}
.ab3{width:500px;height:700px;background:radial-gradient(#9D4EDD12,transparent 70%);bottom:-20%;left:15%;animation-delay:-10s}
@keyframes aFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  40%{transform:translate(25px,-20px) scale(1.04)}
  70%{transform:translate(-15px,25px) scale(0.97)}
}

/* ─── THREE.JS ───────────────────────────────── */
#three-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.55}

/* ─── CURSOR ─────────────────────────────────── */
#cur{
  position:fixed;z-index:9999;pointer-events:none;
  width:8px;height:8px;background:var(--gold);border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px var(--gold),0 0 24px rgba(255,215,0,0.3);
}
#cur-ring{
  position:fixed;z-index:9998;pointer-events:none;
  width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(255,215,0,0.4);
  transform:translate(-50%,-50%);
}

/* ─── APP SHELL ──────────────────────────────── */
.app-layout{display:flex;height:100vh;overflow:hidden;position:relative;z-index:10}

/* ─── SIDEBAR ────────────────────────────────── */
.sidebar{
  width:220px;min-width:220px;display:flex;flex-direction:column;
  background:rgba(7,5,26,0.97);
  border-right:1px solid var(--border2);
  backdrop-filter:blur(40px);position:relative;z-index:20;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,var(--gold),var(--blue),transparent);
  opacity:.15;
}
.sidebar-logo{
  padding:26px 20px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.sidebar-logo-icon{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:#000;
  box-shadow:var(--glow-gold);
}
.sidebar-logo-text{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  animation:glitch 9s infinite;
}
.sidebar-logo-text span{color:var(--gold)}
@keyframes glitch{
  0%,93%,100%{opacity:1;transform:none;text-shadow:none}
  94%{opacity:.8;transform:skewX(-4deg);text-shadow:2px 0 var(--blue),-2px 0 var(--gold)}
  95%{opacity:1;transform:skewX(3deg);text-shadow:-1px 0 var(--blue)}
  96%{opacity:.9;transform:none;text-shadow:none}
}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-lbl{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:3px;color:var(--text3);text-transform:uppercase;
  padding:6px 10px 4px;display:block;
}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;
  border-radius:10px;color:var(--text2);font-size:13px;font-weight:500;
  border:none;background:none;width:100%;text-align:left;
  transition:all .25s;position:relative;margin-bottom:2px;cursor:none;overflow:hidden;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:0;
  background:linear-gradient(var(--gold),var(--blue));
  border-radius:0 2px 2px 0;transition:height .3s;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);
  color:var(--gold);
}
.nav-item.active::before{height:65%}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  box-shadow:0 0 8px rgba(255,45,85,0.4);font-family:'JetBrains Mono',monospace;
}
.sidebar-user{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-avatar{
  width:36px;height:36px;flex-shrink:0;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#000;
  font-family:'JetBrains Mono',monospace;box-shadow:var(--glow-gold);
}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-username{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sidebar-userlevel{font-size:10px;color:var(--gold);font-family:'JetBrains Mono',monospace;letter-spacing:.5px;margin-top:2px}
.saving-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;box-shadow:var(--glow-green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sidebar-logout{
  background:none;border:none;color:var(--text3);
  cursor:none;padding:6px;border-radius:8px;font-size:16px;
  transition:all .2s;display:flex;
}
.sidebar-logout:hover{color:var(--red);background:rgba(255,45,85,0.08)}

/* ─── BOTTOM NAV ─────────────────────────────── */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  background:rgba(7,5,26,0.97);
  border-top:1px solid var(--border2);backdrop-filter:blur(40px);
}
.bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 8px;border:none;background:none;
  color:var(--text3);cursor:none;transition:all .25s;min-width:48px;position:relative;
}
.bn-item.active{color:var(--gold)}
.bn-item-icon{font-size:19px;line-height:1}
.bn-item-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.bn-badge{
  position:absolute;top:0;right:4px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;
  box-shadow:0 0 8px rgba(255,45,85,0.5);
}

/* ─── TOPBAR ─────────────────────────────────── */
.topbar{
  padding:0 24px;height:58px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,5,26,0.9);border-bottom:1px solid var(--border);
  backdrop-filter:blur(40px);position:relative;z-index:15;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--blue),transparent);
  opacity:.12;
}
.topbar-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-balance{
  display:flex;align-items:center;gap:8px;padding:7px 15px;
  border-radius:10px;
  background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  color:var(--blue);box-shadow:var(--glow-blue);letter-spacing:.5px;
}
.topbar-notif{
  width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.03);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;cursor:none;position:relative;font-size:16px;transition:all .25s;
}
.topbar-notif:hover{border-color:var(--border3)}
.notif-dot{
  position:absolute;top:7px;right:7px;width:6px;height:6px;
  background:var(--red);border-radius:50%;box-shadow:0 0 8px var(--red);animation:pulse 2s infinite;
}

/* ─── MAIN ───────────────────────────────────── */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:10}
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.page-header{padding:30px 26px 0;margin-bottom:24px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:var(--text);text-transform:uppercase}
.page-title span{
  background:linear-gradient(135deg,var(--gold),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.page-body{padding:0 22px 100px}

/* ─── STATS GRID ─────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{
  padding:18px 20px;border-radius:14px;
  background:rgba(17,16,42,0.98);border:1px solid var(--border);
  position:relative;overflow:hidden;transition:all .3s;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--blue));
  transform:scaleX(0);transform-origin:left;transition:transform .4s;
  border-radius:0 0 14px 14px;
}
.stat-card:hover{border-color:rgba(255,215,0,0.12);transform:translateY(-2px)}
.stat-card:hover::after{transform:scaleX(1)}
.stat-lbl{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.stat-icon{font-size:14px;opacity:.5}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1;color:var(--text)}
.stat-chg{font-size:11px;margin-top:6px;color:var(--green);font-family:'JetBrains Mono',monospace}
.stat-chg.dim{color:var(--text3)}
/* Colored stat icons */
.si-gold{background:rgba(255,215,0,0.1);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.si-green{background:rgba(0,255,148,0.1);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.si-blue{background:rgba(0,229,255,0.1);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.si-purple{background:rgba(157,78,221,0.1);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}

/* ─── PROGRESS ───────────────────────────────── */
.prog-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;position:relative}
.prog-fill{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));
  background-size:200% 100%;animation:shimmer 2s linear infinite;
  transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(255,215,0,0.3);
}
@keyframes shimmer{0%{background-position:0% 0%}100%{background-position:200% 0%}}

/* ─── GOAL BOX ───────────────────────────────── */
.goal-box{
  padding:20px 22px;margin-bottom:20px;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,215,0,0.05),rgba(0,229,255,0.03));
  border:1px solid rgba(255,215,0,0.1);position:relative;overflow:hidden;
}
.goal-box::after{
  content:'TARGET';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:70px;letter-spacing:4px;
  color:rgba(255,215,0,0.03);pointer-events:none;white-space:nowrap;
}

/* ─── SECTION HEADER ─────────────────────────── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);text-transform:uppercase}

/* ─── AD CARDS ───────────────────────────────── */
.ads-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}
.ad-card{
  border-radius:14px;overflow:hidden;
  border:1px solid var(--border);background:rgba(17,16,42,0.98);
  transition:all .3s cubic-bezier(.4,0,.2,1);
  animation:cardIn .4s cubic-bezier(.4,0,.2,1) both;
}
.ad-card:nth-child(1){animation-delay:.05s}
.ad-card:nth-child(2){animation-delay:.1s}
.ad-card:nth-child(3){animation-delay:.15s}
.ad-card:nth-child(4){animation-delay:.2s}
.ad-card:nth-child(5){animation-delay:.25s}
.ad-card:nth-child(6){animation-delay:.3s}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
.ad-card:hover{
  border-color:rgba(255,215,0,0.2);transform:translateY(-4px) perspective(500px) rotateX(2deg);
  box-shadow:0 20px 40px rgba(0,0,0,0.5),0 0 20px rgba(255,215,0,0.05);
}
.ad-card.watched{opacity:.35;filter:grayscale(1)}
.ad-thumb{height:95px;display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;overflow:hidden}
.ad-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(17,16,42,1))}
.ad-cat{
  position:absolute;top:8px;left:8px;z-index:2;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.07);border-radius:5px;
  padding:2px 7px;font-size:8px;color:var(--text2);
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;
}
.ad-rew{
  position:absolute;top:8px;right:8px;z-index:2;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border-radius:5px;padding:2px 8px;
  font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;
  box-shadow:0 0 10px rgba(255,215,0,0.35);
}
.ad-body{padding:12px 14px 14px}
.ad-title{font-weight:600;font-size:12px;margin-bottom:3px;color:var(--text);letter-spacing:.2px}
.ad-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.4}
.ad-meta{display:flex;align-items:center;justify-content:space-between}
.ad-dur{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.btn-watch{
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  border:none;border-radius:7px;padding:6px 13px;
  font-size:10px;font-weight:800;cursor:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase;
  transition:all .25s;box-shadow:0 0 12px rgba(255,215,0,0.2);
}
.btn-watch:hover{box-shadow:0 0 20px rgba(255,215,0,0.4);transform:scale(1.05)}
.btn-watched{
  background:rgba(0,255,148,0.06);color:var(--green);
  border:1px solid rgba(0,255,148,0.2);border-radius:7px;
  padding:6px 13px;font-size:10px;font-weight:700;cursor:default;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase;
}

/* ─── REFERRAL ───────────────────────────────── */
.ref-box{
  background:rgba(255,215,0,0.04);border:1px dashed rgba(255,215,0,0.2);
  border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;transition:all .3s;
}
.ref-box:hover{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.06)}
.ref-code{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;
  letter-spacing:4px;
  background:linear-gradient(135deg,var(--gold),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.btn-copy{
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  border-radius:8px;padding:7px 13px;color:var(--text2);
  font-size:11px;cursor:none;transition:all .25s;font-weight:600;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;
}
.btn-copy:hover{border-color:rgba(255,215,0,0.3);color:var(--gold)}

/* ─── CHIPS ──────────────────────────────────── */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:7px;padding:4px 10px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;text-transform:uppercase;color:var(--text2);
}
.chip-gold{background:rgba(255,215,0,0.06);border-color:rgba(255,215,0,0.2);color:var(--gold)}
.chip-green{background:rgba(0,255,148,0.06);border-color:rgba(0,255,148,0.2);color:var(--green)}
.chip-red{background:rgba(255,45,85,0.06);border-color:rgba(255,45,85,0.2);color:var(--red)}

/* ─── LEADERBOARD ────────────────────────────── */
.lb-card{border-radius:16px;overflow:hidden;margin-bottom:20px;background:rgba(14,12,31,0.99);border:1px solid var(--border)}
.lb-hdr{display:grid;grid-template-columns:44px 1fr 90px 90px;padding:10px 18px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.lb-row{display:grid;grid-template-columns:44px 1fr 90px 90px;padding:13px 18px;border-bottom:1px solid var(--border);align-items:center;transition:background .2s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,0.02)}
.lb-row.me{background:linear-gradient(90deg,rgba(255,215,0,0.05),transparent);border-left:2px solid var(--gold)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.rank-gold{color:var(--gold);text-shadow:0 0 15px rgba(255,215,0,0.4)}
.rank-silver{color:#C0C0C0}
.rank-bronze{color:#CD7F32}
.lb-user{display:flex;align-items:center;gap:9px}
.lb-av{
  width:28px;height:28px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.lb-name{font-size:13px;font-weight:500;color:var(--text)}
.lb-badge{font-size:8px;background:var(--gold);color:#000;border-radius:4px;padding:1px 6px;margin-left:5px;font-weight:800;font-family:'JetBrains Mono',monospace}
.lb-score{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text);letter-spacing:.5px}
.lb-usdt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);font-weight:700}

/* ─── WITHDRAW ───────────────────────────────── */
.w-card{padding:24px;margin-bottom:18px;border-radius:16px;background:rgba(14,12,31,0.99);border:1px solid var(--border)}
.w-bal{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;line-height:1;background:linear-gradient(135deg,var(--gold),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.w-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:block}
.w-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:10px;padding:12px 15px;color:var(--text);font-size:13px;outline:none;transition:all .3s;font-family:'JetBrains Mono',monospace}
.w-input:focus{border-color:rgba(255,215,0,0.3);box-shadow:0 0 0 3px rgba(255,215,0,0.06)}
.w-input::placeholder{color:var(--text3)}
.btn-green{
  width:100%;margin-top:4px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#000;border:none;border-radius:10px;padding:13px;
  font-size:12px;font-weight:800;cursor:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;
  transition:all .3s;box-shadow:var(--glow-green);
}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,255,148,0.25)}
.hist-tbl{border-radius:16px;overflow:hidden;background:rgba(14,12,31,0.99);border:1px solid var(--border)}
.hist-hdr{display:grid;grid-template-columns:1fr 70px 80px 80px;padding:10px 18px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hist-row{display:grid;grid-template-columns:1fr 70px 80px 80px;padding:13px 18px;border-bottom:1px solid var(--border);font-size:13px;align-items:center;transition:background .2s}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:rgba(255,255,255,0.02)}
.badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.badge-pending{background:rgba(255,215,0,0.08);color:var(--gold);border:1px solid rgba(255,215,0,0.2)}
.badge-paid{background:rgba(0,255,148,0.08);color:var(--green);border:1px solid rgba(0,255,148,0.2)}
.badge-failed{background:rgba(255,45,85,0.08);color:var(--red);border:1px solid rgba(255,45,85,0.2)}

/* ─── REFERRAL GATE ──────────────────────────── */
.ref-gate{
  border-radius:18px;padding:32px 26px;margin-bottom:18px;text-align:center;
  background:linear-gradient(135deg,rgba(255,215,0,0.05),rgba(0,229,255,0.03));
  border:1px solid rgba(255,215,0,0.12);position:relative;overflow:hidden;
}
.ref-gate::before{content:'LOCKED';position:absolute;bottom:-15px;right:-15px;font-family:'Bebas Neue',sans-serif;font-size:90px;color:rgba(255,215,0,0.03);pointer-events:none}
.ref-gate-icon{font-size:48px;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.3));display:block}
.ref-gate-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.ref-gate-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.7}
.ref-gate-count{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);white-space:nowrap;letter-spacing:2px;text-shadow:var(--glow-gold)}
.ref-gate-prog{display:flex;align-items:center;gap:14px;margin-bottom:10px}

/* ─── MODAL ──────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-box{
  width:100%;max-width:480px;position:relative;
  background:linear-gradient(180deg,var(--bg3),var(--bg));
  border:1px solid rgba(255,215,0,0.1);border-bottom:none;
  border-radius:24px 24px 0 0;padding:30px 26px 44px;
  animation:modalUp .35s cubic-bezier(.4,0,.2,1);
}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:3px;margin:0 auto 26px;background:linear-gradient(90deg,var(--gold),var(--blue));border-radius:2px;box-shadow:0 0 10px rgba(255,215,0,0.4)}
.modal-close{position:absolute;top:22px;right:22px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:none;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.modal-close:hover{border-color:rgba(255,45,85,0.3);color:var(--red)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.modal-reward{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin:10px 0 4px;text-transform:uppercase}
.ad-play-area{border-radius:14px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid var(--border)}
.ad-countdown{font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--gold);position:absolute;right:14px;bottom:10px;text-shadow:var(--glow-gold);letter-spacing:2px}
.btn-modal{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  border:none;border-radius:12px;padding:14px;font-size:12px;font-weight:800;cursor:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;
  transition:all .3s;box-shadow:var(--glow-gold);position:relative;overflow:hidden;
}
.btn-modal::after{content:'';position:absolute;top:-50%;left:-60%;width:25%;height:200%;background:rgba(255,255,255,0.2);transform:skewX(-20deg);animation:shine 3s infinite}
@keyframes shine{0%,100%{left:-60%}50%{left:130%}}
.btn-modal:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(255,215,0,0.35)}

/* ─── PARTICLE BURST ─────────────────────────── */
.particle{position:fixed;pointer-events:none;z-index:9997;width:6px;height:6px;border-radius:50%;animation:pBurst .8s cubic-bezier(.4,0,.2,1) forwards}
@keyframes pBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* ─── PROFILE ────────────────────────────────── */
.prof-card{border-radius:18px;padding:26px;margin-bottom:14px;text-align:center;background:linear-gradient(180deg,rgba(255,215,0,0.05) 0%,rgba(14,12,31,0.99) 100%);border:1px solid rgba(255,215,0,0.08)}
.prof-avatar-big{
  width:76px;height:76px;margin:0 auto 16px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:#000;font-family:'JetBrains Mono',monospace;
  box-shadow:var(--glow-gold);animation:hexFloat 4s ease-in-out infinite;
}
@keyframes hexFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.prof-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.04);border-radius:12px;overflow:hidden;margin-top:18px;border:1px solid var(--border)}
.prof-stat{background:rgba(14,12,31,0.99);padding:14px;text-align:center;transition:background .25s}
.prof-stat:hover{background:rgba(255,215,0,0.04)}
.prof-stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;background:linear-gradient(135deg,var(--gold),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.prof-stat-label{font-size:9px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase}
.settings-sec{border-radius:16px;padding:20px;margin-bottom:12px;background:rgba(14,12,31,0.99);border:1px solid var(--border)}
.settings-sec h3{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;font-weight:500;color:var(--text)}
.set-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.toggle{width:42px;height:22px;background:rgba(255,255,255,0.06);border-radius:11px;position:relative;cursor:none;border:1px solid var(--border2);transition:all .3s;flex-shrink:0}
.toggle.on{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;box-shadow:0 0 12px rgba(255,215,0,0.2)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.toggle.on::after{left:22px}

/* ─── AUTH ───────────────────────────────────── */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;
  background:radial-gradient(ellipse at 25% 50%,rgba(255,215,0,0.05) 0%,transparent 60%),
             radial-gradient(ellipse at 75% 50%,rgba(0,229,255,0.04) 0%,transparent 60%),var(--bg);
}
.auth-card{
  width:100%;max-width:420px;padding:42px 38px;
  background:rgba(14,12,31,0.99);border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;backdrop-filter:blur(40px);
  animation:authIn .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--blue),transparent)}
@keyframes authIn{from{opacity:0;transform:translateY(28px) scale(.97);filter:blur(3px)}to{opacity:1;transform:none;filter:none}}
.auth-logo{display:flex;align-items:center;gap:13px;margin-bottom:34px;justify-content:center}
.auth-logo-icon{
  width:44px;height:44px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:#000;
  box-shadow:var(--glow-gold);animation:hexFloat 3s ease-in-out infinite;
}
.auth-logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;animation:glitch 9s infinite}
.auth-logo-text span{color:var(--gold)}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;text-align:center;margin-bottom:4px;text-transform:uppercase;color:var(--text)}
.auth-sub{color:var(--text2);font-size:12px;text-align:center;margin-bottom:26px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.form-group{margin-bottom:15px}
.form-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:block}
.form-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 15px;color:var(--text);font-size:14px;outline:none;transition:all .3s}
.form-input:focus{border-color:rgba(255,215,0,0.3);box-shadow:0 0 0 3px rgba(255,215,0,0.06);background:rgba(255,215,0,0.02)}
.form-input::placeholder{color:var(--text3)}
.form-input-optional{font-size:9px;color:var(--text3);margin-left:4px;letter-spacing:0;text-transform:none;font-family:'Space Grotesk',sans-serif}
.btn-gold{
  width:100%;margin-top:5px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  border:none;border-radius:10px;padding:13px;font-size:12px;font-weight:800;
  font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;
  transition:all .3s;box-shadow:var(--glow-gold);position:relative;overflow:hidden;cursor:none;
}
.btn-gold::after{content:'';position:absolute;top:-50%;left:-60%;width:25%;height:200%;background:rgba(255,255,255,0.2);transform:skewX(-20deg);animation:shine 3s infinite}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(255,215,0,0.3)}
.btn-gold:disabled{opacity:.5;transform:none;cursor:not-allowed}
.btn-outline{width:100%;margin-top:9px;background:transparent;color:var(--text2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px;font-size:11px;font-weight:600;transition:all .3s;cursor:none;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.btn-outline:hover{border-color:rgba(255,215,0,0.3);color:var(--gold)}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
.auth-switch button{background:none;border:none;color:var(--gold);font-weight:700;cursor:none;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.auth-forgot{text-align:right;margin-top:-4px;margin-bottom:12px}
.auth-forgot button{background:none;border:none;color:var(--text3);font-size:11px;cursor:none;transition:color .2s;font-family:'JetBrains Mono',monospace}
.auth-forgot button:hover{color:var(--gold)}
.msg-error{background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:13px;font-family:'JetBrains Mono',monospace}
.msg-success{background:rgba(0,255,148,0.08);border:1px solid rgba(0,255,148,0.2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:13px;font-family:'JetBrains Mono',monospace}
.msg-info{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:13px;font-family:'JetBrains Mono',monospace}

/* ─── SPLASH ─────────────────────────────────── */
.splash{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:18px}
.splash-logo-3d{width:76px;height:76px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:30px;color:#000;box-shadow:var(--glow-gold);animation:hexFloat 2s ease-in-out infinite}
.splash-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-ring{width:38px;height:38px;border-radius:50%;border:2px solid transparent;border-top-color:var(--gold);border-right-color:var(--blue);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ─── TOAST ──────────────────────────────────── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(14,12,31,0.99);border:1px solid rgba(255,215,0,0.15);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;z-index:9999;white-space:nowrap;box-shadow:0 20px 50px rgba(0,0,0,0.6),var(--glow-gold);font-family:'JetBrains Mono',monospace;letter-spacing:.3px;animation:toastPop .4s cubic-bezier(.4,0,.2,1)}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(.92)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* ─── ADMIN ──────────────────────────────────── */
.admin-wrap{min-height:100vh;padding:26px;background:transparent}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;text-transform:uppercase}
.admin-title span{color:var(--red)}
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.admin-stat{padding:18px;border-radius:14px;background:rgba(14,12,31,0.99);border:1px solid var(--border);transition:border-color .3s}
.admin-stat:hover{border-color:rgba(255,215,0,0.1)}
.admin-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px}
.admin-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px}
.admin-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.admin-tab{padding:8px 18px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--text2);font-size:11px;font-weight:700;cursor:none;transition:all .25s;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.admin-tab.active{background:rgba(255,45,85,0.08);border-color:rgba(255,45,85,0.25);color:var(--red)}
.admin-table{border-radius:16px;overflow:hidden;margin-bottom:18px;background:rgba(14,12,31,0.99);border:1px solid var(--border)}
.admin-table-hdr{padding:11px 18px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;display:grid}
.admin-table-row{padding:13px 18px;border-bottom:1px solid var(--border);align-items:center;display:grid;font-size:13px;transition:background .2s}
.admin-table-row:last-child{border-bottom:none}
.admin-table-row:hover{background:rgba(255,255,255,0.02)}
.admin-users-hdr{grid-template-columns:1fr 140px 80px 80px 80px 110px}
.admin-users-row{grid-template-columns:1fr 140px 80px 80px 80px 110px}
.admin-wd-hdr{grid-template-columns:1fr 120px 80px 80px 100px 110px}
.admin-wd-row{grid-template-columns:1fr 120px 80px 80px 100px 110px}
.admin-btn{border-radius:7px;padding:5px 11px;font-size:10px;font-weight:700;cursor:none;transition:all .25s;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase;border:1px solid}
.admin-btn-green{background:rgba(0,255,148,0.06);color:var(--green);border-color:rgba(0,255,148,0.2)}
.admin-btn-green:hover{background:var(--green);color:#000;border-color:var(--green)}
.admin-btn-red{background:rgba(255,45,85,0.06);color:var(--red);border-color:rgba(255,45,85,0.2)}
.admin-btn-red:hover{background:var(--red);color:#fff;border-color:var(--red)}
.admin-search{background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:10px;padding:10px 15px;color:var(--text);font-size:13px;outline:none;width:100%;max-width:320px;transition:all .3s;font-family:'JetBrains Mono',monospace;margin-bottom:16px}
.admin-search:focus{border-color:rgba(255,215,0,0.3)}
.admin-search::placeholder{color:var(--text3)}

<script>
/* Three.js */
(function(){
  try{
    var c=document.getElementById('three-canvas');
    var r=new THREE.WebGLRenderer({canvas:c,alpha:true,antialias:true});
    r.setPixelRatio(Math.min(devicePixelRatio,2));
    r.setSize(innerWidth,innerHeight);
    var scene=new THREE.Scene();
    var cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,1000);
    cam.position.z=35;
    var N=500,geo=new THREE.BufferGeometry();
    var pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(var i=0;i<N;i++){
      pos[i*3]=(Math.random()-.5)*80;pos[i*3+1]=(Math.random()-.5)*80;pos[i*3+2]=(Math.random()-.5)*60;
      var gold=Math.random()>.45;
      col[i*3]=gold?1:0;col[i*3+1]=gold?.84:.9;col[i*3+2]=gold?0:1;
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    var mat=new THREE.PointsMaterial({size:.13,vertexColors:true,transparent:true,opacity:.6});
    var pts=new THREE.Points(geo,mat);
    scene.add(pts);
    var icoG=new THREE.IcosahedronGeometry(9,1);
    var icoM=new THREE.MeshBasicMaterial({color:0xFFD700,wireframe:true,transparent:true,opacity:.04});
    var ico=new THREE.Mesh(icoG,icoM);
    scene.add(ico);
    var mx=0,my=0,sy=0;
    addEventListener('mousemove',function(e){mx=(e.clientX/innerWidth-.5);my=(e.clientY/innerHeight-.5)});
    setInterval(function(){var el=document.querySelector('.page-scroll');if(el)sy=el.scrollTop;},80);
    addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
    var t=0;
    (function frame(){requestAnimationFrame(frame);t+=.003;pts.rotation.y=t*.1+mx*.07;pts.rotation.x=t*.06+my*.05;ico.rotation.x=t*.14;ico.rotation.y=t*.19;cam.position.z=35+sy*.01;r.render(scene,cam)})();
  }catch(e){}
})();

/* Cursor */
(function(){
  var c=document.getElementById('cur'),r=document.getElementById('cur-ring');
  if(!c||!r)return;
  var rx=0,ry=0,cx=0,cy=0;
  addEventListener('mousemove',function(e){cx=e.clientX;cy=e.clientY;c.style.left=cx+'px';c.style.top=cy+'px'});
  (function loop(){rx+=(cx-rx)*.11;ry+=(cy-ry)*.11;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(loop)})();
  document.addEventListener('mousedown',function(){c.style.transform='translate(-50%,-50%) scale(.5)'});
  document.addEventListener('mouseup',function(){c.style.transform='translate(-50%,-50%) scale(1)'});
})();

/* Card tilt */
function applyTilt(el){
  el.addEventListener('mousemove',function(e){
    var rect=el.getBoundingClientRect();
    var x=(e.clientX-rect.left)/rect.width-.5;
    var y=(e.clientY-rect.top)/rect.height-.5;
    el.style.transform='perspective(600px) rotateY('+(x*10)+'deg) rotateX('+(-y*8)+'deg) translateZ(4px)';
  });
  el.addEventListener('mouseleave',function(){el.style.transform=''});
}
function initTilts(){document.querySelectorAll('.stat-card,.ad-card,.w-card,.lb-card').forEach(applyTilt)}
setInterval(initTilts,1500);

/* Particle burst */
function burst(x,y){
  for(var i=0;i<16;i++){
    var p=document.createElement('div');
    p.className='particle';
    var a=Math.random()*Math.PI*2,d=50+Math.random()*70;
    p.style.cssText='left:'+x+'px;top:'+y+'px;--tx:'+(Math.cos(a)*d)+'px;--ty:'+(Math.sin(a)*d)+'px;background:'+(Math.random()>.5?'#FFD700':'#00E5FF')+';box-shadow:0 0 6px currentColor';
    document.body.appendChild(p);
    setTimeout(function(){p.remove()},800);
  }
}
window.burst=burst;
</script>

<script type="text/babel">

// ── AUTH PAGE ──────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',refCode:''});
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [busy,setBusy]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  async function submit(e){
    e.preventDefault(); setErr(''); setOk(''); setBusy(true);
    const email=form.email.trim().toLowerCase();
    const pass=form.password;

    if(mode==='forgot'){
      if(!email){setErr('Enter your email.');setBusy(false);return;}
      try{ await auth.sendPasswordResetEmail(email); setOk('✅ Reset email sent! Check your inbox.'); setMode('login'); }
      catch(ex){ setErr(ex.code==='auth/user-not-found'?'No account with this email.':'Failed. Try again.'); }
      setBusy(false); return;
    }

    if(!email||!pass){setErr('Fill all fields.');setBusy(false);return;}
    if(pass.length<6){setErr('Password must be 6+ characters.');setBusy(false);return;}

    try {
      if(mode==='register'){
        if(!form.name.trim()){setErr('Enter your name.');setBusy(false);return;}
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:form.name.trim()});

        // Generate unique referral code from uid
        const refCode='AE'+cred.user.uid.slice(0,6).toUpperCase();

        // Check if they used someone's referral code
        let referredBy=null;
        const enteredCode=form.refCode.trim().toUpperCase();
        if(enteredCode){
          const codeSnap=await db.collection('refCodes').doc(enteredCode).get();
          if(codeSnap.exists){ referredBy=codeSnap.data().uid; }
        }

        // Save user doc
        await db.collection('users').doc(cred.user.uid).set({
          name:form.name.trim(), email,
          score:0, refCode,
          referralCount:0, referralUnlocked:false,
          watchedByDate:{}, withdrawals:[],
          joinedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Save referral code lookup
        await db.collection('refCodes').doc(refCode).set({uid:cred.user.uid});

        // Credit referrer
        if(referredBy){
          const referrerRef=db.collection('users').doc(referredBy);
          await db.runTransaction(async t=>{
            const doc=await t.get(referrerRef);
            const cur=doc.data().referralCount||0;
            const newCount=cur+1;
            const unlocked=newCount>=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW;
            t.update(referrerRef,{
              referralCount:newCount,
              referralUnlocked:unlocked,
              score:firebase.firestore.FieldValue.increment(CONFIG.REFERRAL_BONUS_PTS)
            });
          });
          // Bonus for new user too
          await db.collection('users').doc(cred.user.uid).update({
            score:CONFIG.REFERRAL_BONUS_PTS
          });
        }

        onLogin({uid:cred.user.uid,name:form.name.trim(),email,score:referredBy?CONFIG.REFERRAL_BONUS_PTS:0,
          refCode,referralCount:0,referralUnlocked:false,watchedByDate:{},withdrawals:[]});

      } else {
        const cred=await auth.signInWithEmailAndPassword(email,pass);
        const snap=await db.collection('users').doc(cred.user.uid).get();
        const d=snap.data()||{};
        onLogin({uid:cred.user.uid,name:d.name||email.split('@')[0],email,
          score:d.score||0,refCode:d.refCode||'',
          referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
          watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
      }
    } catch(ex){
      const msgs={
        'auth/email-already-in-use':'Email already registered. Sign in instead.',
        'auth/user-not-found':'No account with this email. Register first.',
        'auth/wrong-password':'Wrong password. Try again or reset it.',
        'auth/invalid-email':'Invalid email address.',
        'auth/too-many-requests':'Too many attempts. Try again later.',
      };
      setErr(msgs[ex.code]||ex.message);
    }
    setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">A</div>
          <div className="auth-logo-text">Ad<span>Earn</span></div>
        </div>
        <h2 className="auth-title">
          {mode==='login'?'Welcome Back':mode==='register'?'Create Account':'Reset Password'}
        </h2>
        <p className="auth-sub">
          {mode==='login'?'Sign in to start earning Rupees'
          :mode==='register'?'Join and earn Rupees watching ads'
          :'Enter your email to receive a reset link'}
        </p>
        <form onSubmit={submit}>
          {err&&<div className="msg-error">⚠️ {err}</div>}
          {ok&&<div className="msg-success">{ok}</div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="Hamza Khan" value={form.name} onChange={set('name')}/>
          </div>}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} autoComplete="email"/>
          </div>
          {mode!=='forgot'&&<div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min 6 characters" value={form.password} onChange={set('password')}/>
          </div>}
          {mode==='register'&&<div className="form-group">
            <label className="form-label">Referral Code <span className="form-input-optional">(optional)</span></label>
            <input className="form-input" placeholder="e.g. AEABC123" value={form.refCode} onChange={set('refCode')}/>
          </div>}
          {mode==='login'&&<div className="auth-forgot">
            <button type="button" onClick={()=>{setErr('');setOk('');setMode('forgot');}}>Forgot password?</button>
          </div>}
          <button className="btn-gold" type="submit" disabled={busy}>
            {busy?'⏳ Please wait…':mode==='login'?'Sign In →':mode==='register'?'Create Account →':'Send Reset Email →'}
          </button>
          {mode==='forgot'&&<button className="btn-outline" type="button" onClick={()=>{setErr('');setOk('');setMode('login');}}>← Back to Sign In</button>}
        </form>
        {mode!=='forgot'&&<div className="auth-switch">
          {mode==='login'
            ?<>No account? <button onClick={()=>{setErr('');setOk('');setMode('register');}}>Register here</button></>
            :<>Have account? <button onClick={()=>{setErr('');setOk('');setMode('login');}}>Sign In</button></>}
        </div>}
      </div>
    </div>
  );
}

// ── AD MODAL ───────────────────────────────────────────────────────────────
function AdModal({ad,onClose,onComplete}){
  const [phase,setPhase]=useState('preview');
  const [timer,setTimer]=useState(ad.duration);
  const [progress,setProgress]=useState(0);
  useEffect(()=>{
    if(phase!=='watching')return;
    const iv=setInterval(()=>{
      setTimer(t=>{ if(t<=1){clearInterval(iv);setPhase('done');return 0;} return t-1; });
      setProgress(p=>Math.min(100,p+(100/ad.duration)));
    },1000);
    return()=>clearInterval(iv);
  },[phase]);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&phase!=='watching'&&onClose()}>
      <div className="modal-box">
        <div className="modal-handle"/>
        {phase!=='watching'&&<button className="modal-close" onClick={()=>phase!=='watching'&&onClose()}>✕</button>}
        {phase==='preview'&&<>
          <div className="modal-title">{ad.title}</div>
          <div className="modal-sub">{ad.cat} · {ad.duration}s · +{ad.reward} pts</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}}>{ad.emoji}</span>
            <span style={{fontSize:12,color:'var(--text2)',marginTop:6,padding:'0 16px',textAlign:'center'}}>{ad.desc}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>⏱ {ad.duration}s watch time</span>
            <span className="chip chip-gold">+{ad.reward} pts</span>
          </div>
          <button className="btn-modal" onClick={()=>setPhase('watching')}>▶ Watch Ad</button>
        </>}
        {phase==='watching'&&<>
          <div className="modal-title">Watching Ad…</div>
          <div className="modal-sub">Don't close this window</div>
          <div className="ad-play-area" style={{background:ad.color}}>
            <span style={{fontSize:48}} className="pulse">{ad.emoji}</span>
            <div className="ad-countdown">{timer}</div>
          </div>
          <div className="prog-wrap" style={{marginBottom:10}}>
            <div className="prog-fill" style={{width:progress+'%'}}/>
          </div>
          <p style={{textAlign:'center',fontSize:13,color:'var(--text2)'}}>{timer}s remaining…</p>
        </>}
        {phase==='done'&&<>
          <div style={{textAlign:'center',paddingTop:4}}>
            <div style={{fontSize:48,marginBottom:8}}>🎉</div>
            <div className="modal-title">Ad Complete!</div>
            <div className="modal-sub">Points credited to your balance</div>
            <div className="modal-reward">+{ad.reward}</div>
            <div style={{fontSize:13,color:'var(--text2)',textAlign:'center',marginBottom:4}}>points earned</div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 16px',marginBottom:18,fontSize:13,color:'var(--text2)'}}>
              {`≈ Rs. ${(ad.reward/CONFIG.POINTS_PER_PKR).toFixed(1)} Rupees equivalent`}
            </div>
            <button className="btn-modal" onClick={(e)=>{window.burst&&window.burst(e.clientX,e.clientY);onComplete(ad)}}>Claim & Next Ad →</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── WITHDRAW PAGE ──────────────────────────────────────────────────────────
function WithdrawPage({user,score,showToast,onWithdrawal}){
  const [wallet,setWallet]=useState('');
  const [amount,setAmount]=useState('');
  const bal=Math.floor(score/CONFIG.POINTS_PER_PKR);
  const unlocked=user.referralUnlocked;
  const needed=CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW-user.referralCount;

  function submit(){
    if(!wallet.trim()){showToast('Enter your wallet address','⚠️');return;}
    if(!amount||parseFloat(amount)<CONFIG.MIN_WITHDRAWAL){showToast(`Min withdrawal is Rs.${CONFIG.MIN_WITHDRAWAL}`,'⚠️');return;}
    if(parseFloat(amount)>parseFloat(bal)){showToast('Insufficient balance','❌');return;}
    const r={date:fmtDate(),amount:parseFloat(amount).toFixed(2),score:Math.round(parseFloat(amount)*CONFIG.POINTS_PER_PKR),status:'pending',ts:Date.now()};
    onWithdrawal(r);
    showToast(`Withdrawal of Rs.${amount} submitted!`,'✅');
    setWallet('');setAmount('');
  }

  return(
    <div style={{animation:'fadeIn .35s ease'}}>
      <div className="page-header">
        <h1 className="page-title">Withdraw <span>Rupees</span></h1>
        <p className="page-sub">Min Rs.200 · Easypaisa / JazzCash / Bank</p>
      </div>
      <div className="page-body">
        {/* Referral gate */}
        {!unlocked&&(
          <div className="ref-gate">
            <div className="ref-gate-icon">🔒</div>
            <div className="ref-gate-title">Withdrawals Locked</div>
            <div className="ref-gate-sub">
              You need to refer <strong style={{color:'var(--gold)'}}>{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW} friends</strong> before your first withdrawal.<br/>
              This ensures fair use of the platform.
            </div>
            <div className="ref-gate-prog">
              <div className="ref-gate-count">{user.referralCount}/{CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW}</div>
              <div style={{flex:1}}>
                <div className="prog-wrap" style={{height:10}}>
                  <div className="prog-fill" style={{width:Math.min(100,(user.referralCount/CONFIG.REFERRALS_TO_UNLOCK_WITHDRAW)*100)+'%'}}/>
                </div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{needed} more referral{needed!==1?'s':''} to unlock</div>
              </div>
            </div>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',textAlign:'left'}}>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Your referral code:</div>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:18,color:'var(--gold)',letterSpacing:2}}>{user.refCode}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>Share this with friends → go to Dashboard for full sharing options</div>
            </div>
          </div>
        )}

        {/* Withdrawal form */}
        <div className="w-card" style={{opacity:unlocked?1:.5,pointerEvents:unlocked?'auto':'none'}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Available Balance</div>
          <div className="w-bal">Rs. {bal}</div>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:16}}>{score.toLocaleString()} pts · {CONFIG.POINTS_PER_PKR} pts = Rs.1</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label className="w-lbl">Easypaisa/JazzCash Number or Bank Account</label>
              <input className="w-input" placeholder="Your Easypaisa/JazzCash number or bank account" value={wallet} onChange={e=>setWallet(e.target.value)}/>
            </div>
            <div>
              <label className="w-lbl">Amount in Rupees</label>
              <input className="w-input" type="number" placeholder={CONFIG.MIN_WITHDRAWAL.toFixed(2)} min={CONFIG.MIN_WITHDRAWAL} step="0.01" value={amount} onChange={e=>setAmount(e.target.value)}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 12px',fontSize:12,color:'var(--text2)'}}>
                <div style={{fontWeight:600,color:'var(--text)',marginBottom:2}}>Minimum</div>${CONFIG.MIN_WITHDRAWAL} USDT
              </div>
              <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 12px',fontSize:12,color:'var(--text2)'}}>
                <div style={{fontWeight:600,color:'var(--text)',marginBottom:2}}>Processing</div>1–24 hours
              </div>
            </div>
            <button className="btn-green" onClick={submit}>Request Withdrawal →</button>
            <div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>⚠️ Double-check your wallet address. Wrong address = lost funds.</div>
          </div>
        </div>

        <div className="sec-header"><div className="sec-title">Withdrawal History</div></div>
        <div className="hist-tbl">
          <div className="hist-hdr"><div>Date</div><div>Score</div><div>Amount</div><div>Status</div></div>
          {(!user.withdrawals||user.withdrawals.length===0)

  const [withdrawals,setWithdrawals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [toast,setToast]=useState(null);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  useEffect(()=>{
    if(!fbReady)return;
    setLoading(true);
    // Load all users from Firestore
    db.collection('users').get().then(snap=>{
      const list=[];
      const wdList=[];
      snap.forEach(doc=>{
        const d={id:doc.id,...doc.data()};
        list.push(d);
        // Collect all withdrawals with user info
        if(d.withdrawals&&d.withdrawals.length>0){
          d.withdrawals.forEach((w,i)=>{
            wdList.push({...w,userName:d.name,userEmail:d.email,userId:doc.id,wIndex:i});
          });
        }
      });
      list.sort((a,b)=>(b.score||0)-(a.score||0));
      wdList.sort((a,b)=>(b.ts||0)-(a.ts||0));
      setUsers(list);
      setWithdrawals(wdList);
      setLoading(false);
    }).catch(e=>{console.error(e);setLoading(false);});
  },[]);

  // Stats
  const totalUsers=users.length;
  const totalScore=users.reduce((s,u)=>s+(u.score||0),0);
  const totalPKR=Math.floor(totalScore/CONFIG.POINTS_PER_PKR);
  const pendingWDs=withdrawals.filter(w=>w.status==='pending');
  const totalPaid=withdrawals.filter(w=>w.status==='paid').reduce((s,w)=>s+parseFloat(w.amount||0),0).toFixed(2);

  // Mark withdrawal as paid
  async function markPaid(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'paid'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'paid'}:w
      ));
      showToast(`Marked $${wd.amount} as paid ✅`,'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Mark withdrawal as failed
  async function markFailed(wd){
    try{
      const snap=await db.collection('users').doc(wd.userId).get();
      const wds=[...(snap.data().withdrawals||[])];
      wds[wd.wIndex]={...wds[wd.wIndex],status:'failed'};
      await db.collection('users').doc(wd.userId).update({withdrawals:wds});
      setWithdrawals(prev=>prev.map(w=>
        w.userId===wd.userId&&w.wIndex===wd.wIndex?{...w,status:'failed'}:w
      ));
      showToast(`Marked as failed`,'⚠️');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Ban/unban user (set score to 0 and flag)
  async function toggleBan(u){
    try{
      const banned=!u.banned;
      await db.collection('users').doc(u.id).update({banned});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,banned}:x));
      showToast(banned?`${u.name} banned`:`${u.name} unbanned`,banned?'🚫':'✅');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  // Unlock withdrawal for a user manually
  async function unlockWithdraw(u){
    try{
      await db.collection('users').doc(u.id).update({referralUnlocked:true});
      setUsers(prev=>prev.map(x=>x.id===u.id?{...x,referralUnlocked:true}:x));
      showToast(`Withdrawal unlocked for ${u.name}`,'🔓');
    }catch(e){showToast('Error: '+e.message,'❌');}
  }

  const filteredUsers=users.filter(u=>
    u.name?.toLowerCase().includes(search.toLowerCase())||
    u.email?.toLowerCase().includes(search.toLowerCase())
  );

  const filteredWDs=withdrawals.filter(w=>
    tab==='pending'?w.status==='pending':true
  ).filter(w=>
    w.userName?.toLowerCase().includes(search.toLowerCase())||
    w.userEmail?.toLowerCase().includes(search.toLowerCase())
  );

  if(loading) return <Splash text="Loading admin data…"/>;

  return(
    <div className="admin-wrap">
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
      <div className="admin-topbar">
        <div>
          <div className="admin-title">⚙️ Admin <span>Panel</span></div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>Manage users, withdrawals and platform data</div>
        </div>
        <button onClick={onBack} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'9px 18px',color:'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          ← Back to Site
        </button>
      </div>

      {/* Stats */}
      <div className="admin-stats">
        <div className="admin-stat">
          <div className="admin-stat-lbl">👥 Total Users</div>
          <div className="admin-stat-val" style={{color:'var(--blue)'}}>{totalUsers}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⭐ Total Score</div>
          <div className="admin-stat-val" style={{color:'var(--gold)'}}>{totalScore.toLocaleString()}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">⏳ Pending WDs</div>
          <div className="admin-stat-val" style={{color:'var(--red)'}}>{pendingWDs.length}</div>
        </div>
        <div className="admin-stat">
          <div className="admin-stat-lbl">💸 Total Paid</div>
          <div className="admin-stat-val" style={{color:'var(--green)'}}>{`Rs. ${totalPaid}`}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="admin-tabs">
        {[
          {id:'overview',label:'👥 All Users'},
          {id:'pending',label:`⏳ Pending (${pendingWDs.length})`},
          {id:'withdrawals',label:'💸 All Withdrawals'},
        ].map(t=>(
          <button key={t.id} className={`admin-tab ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);setSearch('');}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Search */}
      <input className="admin-search" placeholder="🔍 Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)}/>

      {/* USERS TABLE */}
      {tab==='overview'&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-users-hdr">
            <div>User</div><div>Email</div><div>Score</div><div>Refs</div><div>Status</div><div>Actions</div>
          </div>
          {filteredUsers.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>No users found</div>}
          {filteredUsers.map(u=>(
            <div className="admin-table-row admin-users-row" key={u.id}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{u.id.slice(0,10)}…</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{u.email}</div>
              <div style={{fontFamily:'Syne',fontWeight:700,color:'var(--gold)'}}>{(u.score||0).toLocaleString()}</div>
              <div style={{textAlign:'center'}}>{u.referralCount||0}</div>
              <div>
                {u.banned
                  ?<span className="admin-badge" style={{background:'#ff4d6a20',color:'var(--red)'}}>Banned</span>
                  :u.referralUnlocked
                    ?<span className="admin-badge" style={{background:'#00d08420',color:'var(--green)'}}>Unlocked</span>
                    :<span className="admin-badge" style={{background:'#f5c84220',color:'var(--gold)'}}>Locked</span>}
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {!u.referralUnlocked&&!u.banned&&(
                  <button className="admin-btn admin-btn-green" onClick={()=>unlockWithdraw(u)}>🔓 Unlock</button>
                )}
                <button className={`admin-btn ${u.banned?'admin-btn-green':'admin-btn-red'}`} onClick={()=>toggleBan(u)}>
                  {u.banned?'✅ Unban':'🚫 Ban'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* WITHDRAWALS TABLE */}
      {(tab==='withdrawals'||tab==='pending')&&(
        <div className="admin-table">
          <div className="admin-table-hdr admin-wd-hdr">
            <div>User</div><div>Date</div><div>Score</div><div>Amount</div><div>Status</div><div>Actions</div>
          </div>
          {filteredWDs.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>
            {tab==='pending'?'No pending withdrawals 🎉':'No withdrawals yet'}
          </div>}
          {filteredWDs.map((w,i)=>(
            <div className="admin-table-row admin-wd-row" key={i}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{w.userName}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{w.userEmail}</div>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{w.date}</div>
              <div style={{fontSize:12}}>{w.score?.toLocaleString()}</div>
              <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--green)'}}>${w.amount}</div>
              <div>
                <span className={`admin-badge ${
                  w.status==='paid'?'badge-paid':w.status==='failed'?'badge-failed':'badge-pending'
                }`} style={{
                  background:w.status==='paid'?'#00d08420':w.status==='failed'?'#ff4d6a20':'#f5c84220',
                  color:w.status==='paid'?'var(--green)':w.status==='failed'?'var(--red)':'var(--gold)'
                }}>
                  {w.status.charAt(0).toUpperCase()+w.status.slice(1)}
                </span>
              </div>
              <div style={{display:'flex',gap:5}}>
                {w.status==='pending'&&<>
                  <button className="admin-btn admin-btn-green" onClick={()=>markPaid(w)}>✅ Paid</button>
                  <button className="admin-btn admin-btn-red" onClick={()=>markFailed(w)}>❌ Fail</button>
                </>}
                {w.status!=='pending'&&<span style={{fontSize:12,color:'var(--text3)'}}>Done</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Quick info */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:18,fontSize:13,color:'var(--text2)',lineHeight:2}}>
        <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:8}}>📋 Quick Guide</div>
        <div>✅ <strong style={{color:'var(--text)'}}>Paid</strong> — User sent money, mark after you send payment to their wallet</div>
        <div>❌ <strong style={{color:'var(--text)'}}>Fail</strong> — Wrong address or rejected, user will see failed status</div>
        <div>🔓 <strong style={{color:'var(--text)'}}>Unlock</strong> — Manually unlock withdrawal for a user without 10 referrals</div>
        <div>🚫 <strong style={{color:'var(--text)'}}>Ban</strong> — Disable a suspicious or fraudulent account</div>
      </div>
    </div>
  );
}

            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:14,marginBottom:4}}>How to earn from offers</div>

        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden',marginBottom:18}}>

          <div>• Complete offers fully — partial completions do not earn points</div>
          <div>• Points may take up to <strong style={{color:'var(--text)'}}>10–30 minutes</strong> to appear after completion</div>
          <div>• Do not use VPN while completing offers</div>
          <div>• Each offer can only be completed once per account</div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',  label:'Home',     icon:'🏠'},
  {id:'earn',       label:'Earn',     icon:'▶️'},
  {id:'offers',     label:'Offers',   icon:'🎯'},
  {id:'leaderboard',label:'Ranks',    icon:'🏆'},
  {id:'withdraw',   label:'Withdraw', icon:'💸'},
  {id:'profile',    label:'Profile',  icon:'👤'},
];

function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [adminMode,setAdminMode]=useState(false);
  const [score,setScore]=useState(0);
  const [watchedByDate,setWatchedByDate]=useState({});
  const [watching,setWatching]=useState(null);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!fbReady){setLoading(false);return;}
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap=await db.collection('users').doc(fbUser.uid).get();
          const d=snap.data()||{};
          // Auto-generate refCode if missing (existing accounts)
          let refCode=d.refCode||'';
          if(!refCode){
            refCode='AE'+fbUser.uid.slice(0,6).toUpperCase();
            // Save it back to Firestore
            await db.collection('users').doc(fbUser.uid).set(
              {refCode},
              {merge:true}
            );
            // Save lookup
            await db.collection('refCodes').doc(refCode).set({uid:fbUser.uid});
          }
          setUser({uid:fbUser.uid,name:d.name||fbUser.displayName||fbUser.email.split('@')[0],email:fbUser.email,
            score:d.score||0,refCode,
            referralCount:d.referralCount||0,referralUnlocked:d.referralUnlocked||false,
            watchedByDate:d.watchedByDate||{},withdrawals:d.withdrawals||[]});
          setScore(d.score||0);
          setWatchedByDate(d.watchedByDate||{});
        }catch(e){console.error(e);}
      } else { setUser(null); }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  function showToast(msg,icon='✅'){setToast({msg,icon});setTimeout(()=>setToast(null),3000);}

  // Build today's visible ads (fresh set each day)
  const today=todayKey();
  const todayWatchedIds=(watchedByDate[today]||[]);
  // Rotate through ALL_ADS — show CONFIG.ADS in batches, cycling
  const visibleAds=CONFIG.ADS.map(ad=>({...ad,watched:todayWatchedIds.includes(ad.id)}));
  const todayWatched=visibleAds.filter(a=>a.watched);

  async function handleAdComplete(ad){
    const newWatchedIds=[...todayWatchedIds,ad.id];
    const newWatchedByDate={...watchedByDate,[today]:newWatchedIds};
    const newScore=score+ad.reward;

    // Bonus if daily goal just reached
    const justReachedGoal=newWatchedIds.length===CONFIG.DAILY_AD_GOAL&&todayWatchedIds.length<CONFIG.DAILY_AD_GOAL;
    const finalScore=justReachedGoal?newScore+CONFIG.BONUS_ON_GOAL:newScore;

    setScore(finalScore);
    setWatchedByDate(newWatchedByDate);
    setWatching(null);

    if(justReachedGoal) showToast(`Daily goal reached! +${CONFIG.BONUS_ON_GOAL} bonus pts! 🎯`,'🎯');
    else showToast(`+${ad.reward} points earned!`,'🎉');

    // Save to Firestore
    if(fbReady&&user?.uid){
      setSaving(true);
      try{ await db.collection('users').doc(user.uid).update({score:finalScore,watchedByDate:newWatchedByDate}); }
      catch(e){console.error(e);}
      setSaving(false);
    }
  }

  async function handleWithdrawal(record){
    const newWithdrawals=[...(user.withdrawals||[]),record];
    setUser(u=>({...u,withdrawals:newWithdrawals}));
    if(fbReady&&user?.uid){
      try{ await db.collection('users').doc(user.uid).update({withdrawals:newWithdrawals}); }
      catch(e){console.error(e);}
    }
  }

  async function handleSignOut(){
    if(fbReady)await auth.signOut();
    setUser(null);setScore(0);setWatchedByDate({});setPage('dashboard');
  }

  function handleLogin(u){
    setUser(u);setScore(u.score||0);setWatchedByDate(u.watchedByDate||{});
  }

  if(loading)return <Splash text="Loading your account…"/>;
  if(!user)return <AuthPage onLogin={handleLogin}/>;
  if(adminMode)return <AdminPanel currentUser={user} onBack={()=>setAdminMode(false)}/>;

  const isAdmin=user.email===CONFIG.ADMIN_EMAIL;
  const unwatched=visibleAds.filter(a=>!a.watched).length;
  const navLabel=n=>
    n.id==='earn'?'Watch & Earn':
    n.id==='offers'?'Real Offers':
    n.id==='leaderboard'?'Leaderboard':n.label;

  return(
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">A</div>
          <div className="sidebar-logo-text">Ad<span>Earn</span></div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-lbl">Menu</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {navLabel(n)}
              {n.id==='earn'&&unwatched>0&&<span className="nav-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="nav-badge">🔒</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="nav-item" onClick={()=>setAdminMode(true)}
              style={{marginTop:8,background:'#ff4d6a15',color:'var(--red)',border:'1px solid #ff4d6a30'}}>
              <span className="nav-icon">⚙️</span>Admin Panel
            </button>
          )}
        </div>
        <div className="sidebar-user">
          <div className="s-avatar">{user.name.slice(0,2).toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="s-name">{user.name}{saving&&<span className="saving-dot"/>}</div>
            <div className="s-pts">⭐ {score.toLocaleString()} pts</div>
          </div>
          <button className="s-logout" onClick={handleSignOut} title="Sign Out">⏻</button>
        </div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{navLabel(NAV.find(n=>n.id===page)||NAV[0])}</div>
          <div className="topbar-right">
            {isAdmin&&(
              <button onClick={()=>setAdminMode(true)}
                style={{background:'#ff4d6a20',border:'1px solid #ff4d6a40',borderRadius:10,padding:'7px 12px',color:'var(--red)',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ⚙️ Admin
              </button>
            )}
            <div className="topbar-balance">
              <span style={{color:'var(--green)'}}>💵</span>
              <span style={{color:'var(--green)',fontWeight:700}}>{`Rs. ${Math.floor(score/CONFIG.POINTS_PER_PKR)}`}</span>
            </div>
            <div className="topbar-notif">🔔<span className="notif-dot"/></div>
          </div>
        </div>

        <div className="page-scroll">
          {page==='dashboard'  &&<Dashboard    user={user} todayWatched={todayWatched} score={score} onWatchAd={setWatching} visibleAds={visibleAds}/>}
          {page==='earn'       &&<EarnPage      visibleAds={visibleAds} onWatchAd={setWatching}/>}
          {page==='offers'     &&<OfferwallPage user={user} showToast={showToast}/>}
          {page==='leaderboard'&&<LeaderboardPage score={score}/>}
          {page==='withdraw'   &&<WithdrawPage  user={user} score={score} showToast={showToast} onWithdrawal={handleWithdrawal}/>}
          {page==='profile'    &&<ProfilePage   user={user} score={score} onSignOut={handleSignOut}/>}
        </div>
      </div>

      <div className="bottom-nav">
        <div className="bn-inner">
          {NAV.map(n=>(
            <button key={n.id} className={`bn-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              {n.id==='earn'&&unwatched>0&&<span className="bn-badge">{unwatched}</span>}
              {n.id==='withdraw'&&!user.referralUnlocked&&<span className="bn-badge">🔒</span>}
              <span className="bn-icon">{n.icon}</span>
              <span className="bn-label">{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      {watching&&<AdModal ad={watching} onClose={()=>setWatching(null)} onComplete={handleAdComplete}/>}
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
